<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex Rok 125 - Ultra Realism Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060709; --panel-bg: #12141c; --text-main: #f3f4f6;
            --text-muted: #8a94a6; --accent-blue: #38bdf8; --accent-green: #34d399;
            --accent-orange: #fb923c; --accent-red: #ef4444; --border-color: #242936;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-color);
            color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 50% -10%, #1e293b 0%, var(--bg-color) 80%);
            overflow-x: hidden;
        }

        header {
            padding: 1rem; text-align: center; border-bottom: 1px solid var(--border-color);
            background: rgba(6, 7, 9, 0.9); z-index: 10;
        }

        h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .subtitle { font-size: 0.8rem; color: var(--accent-orange); letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }

        .container { display: flex; flex-wrap: wrap; max-width: 1400px; margin: 1.5rem auto; gap: 1.5rem; padding: 0 1rem; flex: 1; }

        .animation-section {
            flex: 1 1 550px; background: radial-gradient(circle at center, #111827 0%, #020617 100%);
            border-radius: 16px; padding: 1rem; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid #1e293b; position: relative;
        }

        canvas { max-width: 100%; height: auto; display: block; filter: contrast(1.1) saturate(1.1); }

        .controls-section { flex: 1 1 400px; display: flex; flex-direction: column; gap: 1rem; }

        .panel { background: var(--panel-bg); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border-color); position: relative; }
        .panel::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-red)); }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .panel h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }

        .engine-switch {
            background: #334155; border: 1px solid #475569; color: #fff; padding: 8px 16px;
            font-size: 0.8rem; font-weight: 800; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .engine-switch.on { background: #10b981; border-color: #34d399; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .engine-switch.broken { background: var(--accent-red); border-color: #f87171; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

        .display-box { background: #0b0f19; padding: 1rem; border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: flex-end; }
        .display-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; align-self: flex-start; margin-bottom: 0.5rem; }
        .display-value { font-family: 'JetBrains Mono', monospace; font-size: 3rem; font-weight: 800; line-height: 1; }
        .display-value.rpm { color: var(--accent-blue); }
        .display-value.speed { color: var(--accent-orange); }

        .bar-container { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
        .bar-fill { height: 100%; transition: width 0.1s linear; }
        .bar-fill.rpm { background: linear-gradient(90deg, var(--accent-blue), var(--accent-red)); }
        .bar-fill.speed { background: linear-gradient(90deg, var(--accent-orange), var(--accent-green)); }

        .pedals-container { display: flex; gap: 1rem; margin-top: 0.5rem; }
        .pedal {
            flex: 1; padding: 1.5rem 1rem; text-align: center; border-radius: 10px; font-weight: 800; font-size: 1.2rem;
            letter-spacing: 1px; cursor: pointer; user-select: none; transition: 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.6); opacity: 0.3; pointer-events: none;
        }
        .pedal.active { opacity: 1; pointer-events: auto; }
        .pedal:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0); filter: brightness(1.2); }
        .gas-pedal { background: var(--accent-green); color: #022c22; border: 1px solid #6ee7b7; }
        .brake-pedal { background: var(--accent-red); color: #fff; border: 1px solid #f87171; }

        .physics-log { font-size: 0.85rem; line-height: 1.6; padding: 1rem; background: rgba(0,0,0,0.4); border-left: 3px solid var(--accent-orange); border-radius: 0 8px 8px 0; margin-top: 1rem; font-family: 'JetBrains Mono', monospace; color: #cbd5e1; min-height: 90px; }
        .physics-log strong { color: #fff; }

        @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>Vortex Rok 125cc</h1>
        <div class="subtitle">Physics Engine: Carico Asfalto & Grafica Ultra-Realistica</div>
    </header>

    <main class="container">
        <section class="animation-section" id="canvasContainer">
            <canvas id="engineCanvas" width="600" height="700"></canvas>
        </section>

        <section class="controls-section">
            <div class="panel">
                <div class="panel-header">
                    <h2>Telemetria Dinamica</h2>
                    <button class="engine-switch" id="engineBtn">Start</button>
                </div>
                
                <div class="dash-grid">
                    <div class="display-box">
                        <div class="display-label">Giri Motore (RPM)</div>
                        <div class="display-value rpm" id="rpmValue">0</div>
                        <div class="bar-container"><div class="bar-fill rpm" id="rpmBar" style="width: 0%"></div></div>
                    </div>
                    <div class="display-box">
                        <div class="display-label">Velocità Asse (KM/H)</div>
                        <div class="display-value speed" id="speedValue">0</div>
                        <div class="bar-container"><div class="bar-fill speed" id="speedBar" style="width: 0%"></div></div>
                    </div>
                </div>
                
                <div class="pedals-container">
                    <div class="pedal brake-pedal" id="brakePedal">FRENO</div>
                    <div class="pedal gas-pedal" id="gasPedal">GAS</div>
                </div>

                <div class="physics-log" id="physicsText">
                    Kart fermo ai box. Premi <strong>START</strong> per avviare.
                </div>
            </div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');
        
        // Elementi DOM
        const rpmDisplay = document.getElementById('rpmValue');
        const speedDisplay = document.getElementById('speedValue');
        const rpmBar = document.getElementById('rpmBar');
        const speedBar = document.getElementById('speedBar');
        const physicsText = document.getElementById('physicsText');
        const engineBtn = document.getElementById('engineBtn');
        const gasPedal = document.getElementById('gasPedal');
        const brakePedal = document.getElementById('brakePedal');

        // Parametri Meccanici e Visivi
        const cx = 300, cy = 520, crankRadius = 54, conrodLen = 132, pistW = 94, pistH = 75, cylTop = 200;       

        // Stato Motore e Fisica
        let angle = 0;
        let isEngineRunning = false;
        let isBroken = false;
        
        let engineRpm = 0;
        let speedKmh = 0;
        
        const MIN_RPM = 2800; 
        const MAX_RPM = 13800;
        const MAX_SPEED = 115; // Velocità a 13800 RPM (Rapporto Z11/Z80)
        const CLUTCH_BITE = 4200; // RPM a cui la frizione inizia a far presa
        const RPM_PER_KMH = MAX_RPM / MAX_SPEED; // ~120 RPM ogni 1 km/h in presa diretta

        let gasPressed = false;
        let brakePressed = false;

        // Gestione Input
        function bindPedal(element, isGas) {
            const press = (e) => { e.preventDefault(); if(isEngineRunning && !isBroken) { if(isGas) gasPressed = true; else brakePressed = true; } };
            const release = (e) => { e.preventDefault(); if(isGas) gasPressed = false; else brakePressed = false; };
            element.addEventListener('mousedown', press); element.addEventListener('mouseup', release); element.addEventListener('mouseleave', release);
            try { element.addEventListener('touchstart', press, {passive: false}); } catch(err) { element.addEventListener('touchstart', press); }
            try { element.addEventListener('touchend', release, {passive: false}); } catch(err) { element.addEventListener('touchend', release); }
        }
        bindPedal(gasPedal, true); bindPedal(brakePedal, false);

        engineBtn.addEventListener('click', () => {
            if (isBroken) {
                isBroken = false; engineRpm = 0; speedKmh = 0; isEngineRunning = false;
                gasPedal.classList.remove('active'); brakePedal.classList.remove('active');
                engineBtn.textContent = "Start"; engineBtn.className = "engine-switch";
                return;
            } 
            isEngineRunning = !isEngineRunning;
            if (isEngineRunning) {
                gasPedal.classList.add('active'); brakePedal.classList.add('active');
                engineBtn.textContent = "Stop"; engineBtn.className = "engine-switch on";
            } else {
                gasPedal.classList.remove('active'); brakePedal.classList.remove('active');
                gasPressed = false; brakePressed = false;
                engineBtn.textContent = "Start"; engineBtn.className = "engine-switch";
            }
        });

        // ==========================================
        // MOTORE FISICO (Calcolo Inerzia e Carico)
        // ==========================================
        function updatePhysics() {
            if (!isEngineRunning) {
                engineRpm -= engineRpm * 0.1;
                speedKmh -= speedKmh * 0.02;
                return;
            }

            // MODIFICATO: Ricalibrati coefficienti aerodinamici e di attrito per il kart
            let aeroDrag = (speedKmh * speedKmh) * 0.00012; // Resistenza dell'aria ottimizzata
            let rollingDrag = 0.12; // Attrito degli pneumatici sull'asfalto ridotto a valori reali da pista

            if (speedKmh < 5) { 
                // FASE 1: FRIZIONE STACCATA / IN SLITTAMENTO (Il motore sale di giri velocemente)
                if (gasPressed) {
                    engineRpm += 450; // Sgasata più reattiva
                    if (engineRpm > 6500) engineRpm = 6500; 

                    if (engineRpm > CLUTCH_BITE) {
                        speedKmh += 0.45; 
                        engineRpm -= 180; 
                    }
                } else if (brakePressed) {
                    speedKmh = 0;
                    engineRpm += (MIN_RPM - engineRpm) * 0.15;
                } else {
                    speedKmh -= rollingDrag;
                    engineRpm += (MIN_RPM - engineRpm) * 0.1;
                }
                if (speedKmh < 0) speedKmh = 0;

            } else {
                // FASE 2: FRIZIONE IN PRESA DIRETTA (RPM legati rigidamente alla ruota)
                if (gasPressed) {
                    // MODIFICATO: Curva di coppia potenziata per simulare la cattiveria del 2T Rok
                    // Ora sotto gli 8800 ha abbastanza forza (1.6) per superare i drag e aprire la valvola (2.6)
                    let torque = (engineRpm > 8800) ? 2.6 : 1.6;
                    let acceleration = torque - aeroDrag - rollingDrag;
                    speedKmh += acceleration;
                } else if (brakePressed) {
                    speedKmh -= 2.5; 
                } else {
                    speedKmh -= (aeroDrag + rollingDrag + 0.3); 
                }
                
                if (speedKmh > MAX_SPEED) speedKmh = MAX_SPEED;
                if (speedKmh < 0) speedKmh = 0;

                // Calcolo matematico diretto RPM asse
                let targetRpm = speedKmh * RPM_PER_KMH;
                engineRpm += (targetRpm - engineRpm) * 0.5; // Sincronizzazione fluida
            }

            // Limiti di sicurezza hardware
            if (engineRpm > MAX_RPM) engineRpm = MAX_RPM;
            if (engineRpm < MIN_RPM && isEngineRunning && speedKmh < 2) engineRpm = MIN_RPM;
        }

        // ==========================================
        // AGGIORNAMENTO UI
        // ==========================================
        function updateUI() {
            let rpmDisp = Math.round(engineRpm);
            let speedDisp = Math.floor(speedKmh);

            rpmDisplay.textContent = rpmDisp;
            speedDisplay.textContent = speedDisp;

            rpmBar.style.width = (rpmDisp / MAX_RPM) * 100 + "%";
            speedBar.style.width = (speedKmh / MAX_SPEED) * 100 + "%";

            let logHtml = "";
            if (!isEngineRunning) {
                logHtml = "Motore spento.";
            } else {
                if (rpmDisp > 8800) {
                    logHtml = "<strong>VALVOLA SCARICO APERTA</strong><br>Coppia massima erogata. Il Rok 125 urla a limitatore!";
                } else if (speedKmh >= 5) {
                    logHtml = "<strong>PRESA DIRETTA</strong><br>Frizione agganciata. Spinta lineare in progressione.";
                } else if (rpmDisp > CLUTCH_BITE) {
                    logHtml = "<strong>SLITTAMENTO FRIZIONE</strong><br>Ganasce in attrito. Senti il motore scendere di giri a causa del peso!";
                } else {
                    logHtml = "<strong>MINIMO</strong><br>Frizione staccata. Motore libero da carichi.";
                }
            }
            if(physicsText.innerHTML !== logHtml) physicsText.innerHTML = logHtml;
        }

        // ==========================================
        // MOTORE GRAFICO 2D (Iper-Realismo)
        // ==========================================
        function draw(time) {
            updatePhysics();
            updateUI();

            // Calcolo Angolo Manovella
            if (engineRpm > 0) {
                angle += (engineRpm / 60) * 0.075; 
                if (angle >= Math.PI * 2) angle -= Math.PI * 2;
            }
            
            // Cinematica
            const crankX = cx + crankRadius * Math.sin(angle);
            const crankY = cy - crankRadius * Math.cos(angle);
            let deltaX = Math.abs(crankX - cx); if (deltaX > conrodLen) deltaX = conrodLen;
            const pistY = crankY - Math.sqrt(Math.pow(conrodLen, 2) - Math.pow(deltaX, 2));

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawEngineBlockAndCooling(engineRpm > 8800);
            drawCombustion(pistY, angle, engineRpm);
            drawMovingParts(pistY, crankX, crankY);
            
            if (isEngineRunning && engineRpm > 500) {
                if (angle < 0.25 || angle > Math.PI * 2 - 0.25) drawRealisticSpark();
            }

            requestAnimationFrame(draw);
        }

        function drawEngineBlockAndCooling(valveOpen) {
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(cx - 100, cylTop + 10, 200, cy - cylTop - 80);

            ctx.fillStyle = "#0c0f17"; 
            ctx.fillRect(cx - pistW/2 - 4, cylTop, pistW + 8, cy - cylTop);

            const waterGrad = ctx.createLinearGradient(0, cylTop, 0, cy - 80);
            waterGrad.addColorStop(0, "#0284c7"); 
            waterGrad.addColorStop(1, "#082f49"); 
            ctx.fillStyle = waterGrad;
            ctx.fillRect(cx - 95, cylTop + 15, 35, cy - cylTop - 95); 
            ctx.fillRect(cx + 60, cylTop + 15, 35, cy - cylTop - 95); 

            const headGrad = ctx.createLinearGradient(cx - 100, 0, cx + 100, 0);
            headGrad.addColorStop(0, "#475569");
            headGrad.addColorStop(0.5, "#94a3b8");
            headGrad.addColorStop(1, "#334155");
            
            ctx.fillStyle = headGrad;
            ctx.beginPath();
            ctx.moveTo(cx - 100, cylTop + 10);
            ctx.lineTo(cx - 100, cylTop - 30);
            ctx.lineTo(cx - 30, cylTop - 30); 
            ctx.lineTo(cx + 30, cylTop - 30);
            ctx.lineTo(cx + 100, cylTop - 30);
            ctx.lineTo(cx + 100, cylTop + 10);
            ctx.lineTo(cx + pistW/2, cylTop);
            ctx.lineTo(cx + 20, cylTop - 15); 
            ctx.lineTo(cx - 20, cylTop - 15);
            ctx.lineTo(cx - pistW/2, cylTop);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "#0f172a";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = "#000";
            ctx.beginPath(); ctx.arc(cx - pistW/2 - 2, cylTop, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + pistW/2 + 2, cylTop, 3, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#334155";
            ctx.fillRect(cx - 12, cylTop - 30, 24, 15);
            ctx.fillStyle = "#cbd5e1";
            ctx.fillRect(cx - 14, cylTop - 32, 28, 2);
            ctx.fillStyle = "#64748b";
            ctx.fillRect(cx - 16, cylTop - 45, 32, 13);
            ctx.fillStyle = "#f8fafc";
            ctx.fillRect(cx - 10, cylTop - 75, 20, 30);
            ctx.fillStyle = "#e2e8f0"; 
            ctx.fillRect(cx - 12, cylTop - 70, 24, 3);
            ctx.fillRect(cx - 12, cylTop - 62, 24, 3);
            ctx.fillStyle = "#fbbf24"; 
            ctx.fillRect(cx - 4, cylTop - 80, 8, 5);
            ctx.fillStyle = "#ef4444"; 
            ctx.beginPath(); ctx.roundRect(cx - 12, cylTop - 100, 24, 20, 4); ctx.fill();
            
            ctx.fillStyle = "#f8fafc"; 
            ctx.fillRect(cx - 4, cylTop - 15, 8, 8);
            ctx.fillStyle = "#475569"; 
            ctx.fillRect(cx - 1, cylTop - 7, 2, 4);
            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx + 8, cylTop - 15);
            ctx.lineTo(cx + 8, cylTop - 2);
            ctx.lineTo(cx - 1, cylTop - 2);
            ctx.stroke();

            const exhaustGrad = ctx.createLinearGradient(cx + pistW/2, 220, cx + 180, 220);
            exhaustGrad.addColorStop(0, "#1e293b"); 
            exhaustGrad.addColorStop(0.5, "#334155");
            exhaustGrad.addColorStop(1, "#0f172a");
            
            ctx.fillStyle = exhaustGrad;
            ctx.beginPath();
            ctx.moveTo(cx + pistW/2 + 4, 215);
            ctx.lineTo(cx + 160, 190);
            ctx.lineTo(cx + 160, 280);
            ctx.lineTo(cx + pistW/2 + 4, 275);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = "#0f172a";
            ctx.fillRect(cx + 70, 180, 30, 25);
            
            ctx.fillStyle = "#94a3b8";
            let vY = valveOpen ? 185 : 215; 
            ctx.fillRect(cx + 75, vY, 20, 35);
            if(valveOpen) {
                ctx.shadowColor = "var(--accent-orange)"; ctx.shadowBlur = 10;
                ctx.strokeStyle = "var(--accent-orange)"; ctx.lineWidth = 2;
                ctx.strokeRect(cx + 75, vY, 20, 35);
                ctx.shadowBlur = 0;
            }
        }

        function drawCombustion(pistY, angle, rpm) {
            if (rpm < 100) return;
            const pistTop = pistY - pistH/2;
            let fillHeight = Math.max(0, pistTop - cylTop);
            const intensity = Math.min(1, Math.max(0, rpm / 12000));

            if (angle >= 0 && angle < 0.8) {
                const fire = ctx.createRadialGradient(cx, cylTop, 0, cx, cylTop + 60, 120);
                fire.addColorStop(0, "#ffffff");
                fire.addColorStop(0.1, "#fde047");
                fire.addColorStop(0.4, "rgba(239, 68, 68, 0.9)");
                fire.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = fire;
                ctx.fillRect(cx - pistW/2, cylTop, pistW, fillHeight);
            } 
            else if (angle >= 0.8 && angle <= Math.PI) {
                ctx.fillStyle = `rgba(30, 41, 59, ${0.7 * intensity})`;
                ctx.fillRect(cx - pistW/2, cylTop, pistW, fillHeight);
                
                const flowGrad = ctx.createLinearGradient(cx + pistW/2, 220, cx + 160, 220);
                flowGrad.addColorStop(0, `rgba(100, 116, 139, ${0.8 * intensity})`);
                flowGrad.addColorStop(1, "rgba(0, 0, 0, 0)");
                ctx.fillStyle = flowGrad;
                ctx.beginPath();
                ctx.moveTo(cx + pistW/2, 220); ctx.lineTo(cx + 150, 195);
                ctx.lineTo(cx + 150, 275); ctx.lineTo(cx + pistW/2, 270); ctx.fill();
            } 
            else {
                let alpha = (angle > 4.9) ? 0.3 * intensity : 0.1;
                ctx.fillStyle = `rgba(56, 189, 248, ${alpha})`;
                ctx.fillRect(cx - pistW/2, cylTop, pistW, fillHeight);
            }
        }

        function drawMovingParts(pistY, crankX, crankY) {
            ctx.fillStyle = "#020617";
            ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI * 2); ctx.fill();
            
            const crankGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 54);
            crankGrad.addColorStop(0, "#94a3b8"); crankGrad.addColorStop(1, "#334155");
            ctx.fillStyle = crankGrad;
            ctx.beginPath(); ctx.arc(cx, cy, 54, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#020617";
            ctx.beginPath(); ctx.arc(cx - (crankX-cx)*0.6, cy - (crankY-cy)*0.6, 12, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#b45309";
            ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI * 2); ctx.fill();

            ctx.lineWidth = 14; 
            ctx.strokeStyle = "#475569"; 
            ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(crankX, crankY); ctx.lineTo(cx, pistY); ctx.stroke();
            ctx.lineWidth = 6; ctx.strokeStyle = "#1e293b"; 
            ctx.beginPath(); ctx.moveTo(crankX - (crankX-cx)*0.1, crankY - (crankY-pistY)*0.1); 
            ctx.lineTo(cx + (crankX-cx)*0.1, pistY + (crankY-pistY)*0.1); ctx.stroke();
            
            ctx.fillStyle = "#cbd5e1";
            ctx.beginPath(); ctx.arc(crankX, crankY, 16, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#0f172a";
            ctx.beginPath(); ctx.arc(crankX, crankY, 8, 0, Math.PI * 2); ctx.fill();

            const pistTop = pistY - pistH/2;
            
            const pistGrad = ctx.createLinearGradient(cx - pistW/2, 0, cx + pistW/2, 0);
            pistGrad.addColorStop(0, "#1e293b"); 
            pistGrad.addColorStop(0.2, "#475569");
            pistGrad.addColorStop(0.5, "#94a3b8"); 
            pistGrad.addColorStop(0.8, "#475569");
            pistGrad.addColorStop(1, "#1e293b"); 
            
            ctx.fillStyle = pistGrad;
            ctx.beginPath();
            ctx.moveTo(cx - pistW/2, pistTop + 5);
            ctx.quadraticCurveTo(cx, pistTop - 5, cx + pistW/2, pistTop + 5);
            ctx.lineTo(cx + pistW/2, pistTop + pistH);
            ctx.lineTo(cx - pistW/2, pistTop + pistH);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = "#020617"; 
            ctx.fillRect(cx - pistW/2 - 1, pistTop + 12, pistW + 2, 3); 
            ctx.fillRect(cx - pistW/2 - 1, pistTop + 20, pistW + 2, 3); 
            
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.fillRect(cx - 10, pistTop + 12, 5, 3);
            ctx.fillRect(cx - 10, pistTop + 20, 5, 3);

            ctx.fillStyle = "#1e293b"; 
            ctx.beginPath(); ctx.arc(cx, pistY, 14, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#cbd5e1"; 
            ctx.beginPath(); ctx.arc(cx, pistY, 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#020617"; 
            ctx.beginPath(); ctx.arc(cx, pistY, 6, 0, Math.PI * 2); ctx.fill();
        }

        function drawRealisticSpark() {
            ctx.shadowColor = "#38bdf8";
            ctx.shadowBlur = 15;
            ctx.strokeStyle = "#ffffff"; 
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            
            ctx.beginPath();
            ctx.moveTo(cx - 1, cylTop - 5);
            ctx.lineTo(cx + 4, cylTop - 1);
            ctx.lineTo(cx - 2, cylTop + 3);
            ctx.lineTo(cx + 3, cylTop + 7);
            ctx.lineTo(cx, cylTop + 12);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
        }

        requestAnimationFrame(draw);
    </script>
</body>
