<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulatore Motore 2 Tempi - 18k RPM PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111214;
            --text-main: #f1f2f6;
            --text-muted: #747d8c;
            --accent-blue: #00e5ff;   
            --accent-orange: #ff5e00; 
            --accent-red: #ff3838;    
            --border-color: #22252a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% -10%, #1a1c23 0%, var(--bg-color) 80%);
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #747d8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle { font-size: 0.9rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 2rem auto;
            gap: 2rem;
            padding: 0 1.5rem;
            flex: 1;
        }

        /* Sezione Grafica (Engine) */
        .animation-section {
            flex: 1 1 550px;
            background: radial-gradient(circle at center, #1a1c23 0%, #0a0a0c 100%);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid #2f3542;
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
        }

        /* Effetti Vibrazione Redline Estrema */
        @keyframes extreme-vibration {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-1.5px, 1.5px) rotate(-0.3deg); }
            50% { transform: translate(1.5px, -1.5px) rotate(0.3deg); }
            75% { transform: translate(-1.5px, -1.5px) rotate(-0.3deg); }
            100% { transform: translate(1.5px, 1.5px) rotate(0deg); }
        }
        .shake-warning { animation: extreme-vibration 0.06s infinite; }
        .shake-extreme { animation: extreme-vibration 0.03s infinite; filter: blur(0.5px) drop-shadow(0 0 20px rgba(255,56,56,0.4)); }

        /* Controlli e Telemetria */
        .controls-section {
            flex: 1 1 450px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .panel.redline-active {
            border-color: var(--accent-red);
            box-shadow: 0 0 30px rgba(255, 56, 56, 0.15);
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-orange), var(--accent-red));
        }

        .panel h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Tasto Engine Start */
        .engine-switch {
            background: #2f3542;
            border: 2px solid #57606f;
            color: #fff;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #1e272e;
            letter-spacing: 1px;
        }
        .engine-switch:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #1e272e;
        }
        .engine-switch.on {
            background: var(--accent-red);
            border-color: #ff7675;
            box-shadow: 0 4px 0 #c23616, 0 0 20px rgba(255, 56, 56, 0.4);
        }

        /* Display RPM Numerico */
        .rpm-display-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 1.5rem;
            background: #0a0a0c;
            padding: 1rem;
            border-radius: 8px;
            border: 1px inset #222;
        }

        .rpm-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--accent-blue);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .rpm-unit {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Pedali Racing */
        .pedals-container {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .pedal {
            flex: 1;
            padding: 2rem 1rem;
            text-align: center;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 2px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, filter 0.2s, box-shadow 0.1s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.6);
            opacity: 0.5;
            pointer-events: none;
        }

        .pedal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .pedal:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 rgba(0,0,0,0.6);
            filter: brightness(1.2);
        }

        .gas-pedal { background: #2ed573; color: #000; border: 2px solid #7bed9f; }
        .brake-pedal { background: #ff4757; color: #fff; border: 2px solid #ff7f50; }

        /* Testo Analisi */
        .dynamic-phase {
            font-size: 1rem;
            line-height: 1.6;
            padding: 1.5rem;
            background: rgba(0,0,0,0.4);
            border-left: 4px solid var(--text-muted);
            border-radius: 0 8px 8px 0;
            min-height: 130px;
            font-weight: 300;
        }
        .dynamic-phase strong { font-weight: 600; color: #fff; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .stat-value { color: #fff; font-weight: 700; font-size: 1.1rem; }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .rpm-display { font-size: 3rem; }
            .pedal { padding: 1.5rem 1rem; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Motore 2 Tempi 18.000 RPM</h1>
        <div class="subtitle">Simulatore Fluidodinamico • Pedaliera Attiva • Inerzia Fisica</div>
    </header>

    <main class="container">
        <section class="animation-section" id="canvasContainer">
            <canvas id="engineCanvas" width="650" height="750"></canvas>
        </section>

        <section class="controls-section">
            <div class="panel" id="rpmPanel">
                <h2>
                    Telemetria
                    <button class="engine-switch" id="engineBtn">Accendi</button>
                </h2>
                
                <div class="rpm-display-wrapper">
                    <div class="rpm-display" id="rpmValue">0</div>
                    <div class="rpm-unit">RPM</div>
                </div>
                
                <div class="pedals-container">
                    <div class="pedal brake-pedal" id="brakePedal">FRENO</div>
                    <div class="pedal gas-pedal" id="gasPedal">GAS</div>
                </div>

                <div class="stats-grid">
                    <div>Frequenza Rotazione:<br><span class="stat-value" id="hertzValue">0.0 Hz</span></div>
                    <div>Stato Motore:<br><span class="stat-value" id="statusValue">Spento</span></div>
                </div>
            </div>

            <div class="panel">
                <h2>Ciclo Termodinamico</h2>
                <div class="dynamic-phase" id="dynamicText">
                    Motore spento. Premi "Accendi" per avviare il sistema di iniezione.
                </div>
            </div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');
        
        // Elementi UI
        const rpmDisplay = document.getElementById('rpmValue');
        const dynamicText = document.getElementById('dynamicText');
        const canvasContainer = document.getElementById('canvasContainer');
        const rpmPanel = document.getElementById('rpmPanel');
        const hertzValue = document.getElementById('hertzValue');
        const statusValue = document.getElementById('statusValue');
        const engineBtn = document.getElementById('engineBtn');
        const gasPedal = document.getElementById('gasPedal');
        const brakePedal = document.getElementById('brakePedal');

        // Geometria Motore
        const cx = 325;           
        const cy = 550;           
        const crankRadius = 60;   
        const conrodLen = 185;    
        const pistW = 104;         
        const pistH = 90;         
        const cylTop = 160;       

        // Stato Fisico del Motore
        let angle = 0;
        let lastTime = performance.now();
        
        // Variabili per l'Inerzia e 18k
        let isEngineRunning = false;
        let currentRpm = 0;           
        const MIN_RPM = 1500;         
        const MAX_RPM = 18000; // Limitatore estremo

        let gasPressed = false;
        let brakePressed = false;

        // Gestione Eventi Pedali (Mouse e Touch per Mobile)
        function bindPedal(element, isGas) {
            const press = (e) => { e.preventDefault(); if(isEngineRunning) { if(isGas) gasPressed = true; else brakePressed = true; } };
            const release = (e) => { e.preventDefault(); if(isGas) gasPressed = false; else brakePressed = false; };
            
            element.addEventListener('mousedown', press);
            element.addEventListener('mouseup', release);
            element.addEventListener('mouseleave', release);
            element.addEventListener('touchstart', press, {passive: false});
            element.addEventListener('touchend', release, {passive: false});
        }

        bindPedal(gasPedal, true);
        bindPedal(brakePedal, false);

        // Gestione Tasto Accensione
        engineBtn.addEventListener('click', () => {
            isEngineRunning = !isEngineRunning;
            if (isEngineRunning) {
                engineBtn.textContent = "Spegni";
                engineBtn.classList.add('on');
                gasPedal.classList.add('active');
                brakePedal.classList.add('active');
            } else {
                engineBtn.textContent = "Accendi";
                engineBtn.classList.remove('on');
                gasPedal.classList.remove('active');
                brakePedal.classList.remove('active');
                gasPressed = false;
                brakePressed = false;
            }
        });

        function draw(time) {
            const dt = time - lastTime;
            lastTime = time;

            // 1. FISICA DEL MOTORE E INERZIA
            let targetRpm = 0;
            let accelerationFactor = 0.01; // Decelerazione naturale (attrito)

            if (isEngineRunning) {
                if (gasPressed) {
                    targetRpm = MAX_RPM;
                    accelerationFactor = 0.035; // Accelerazione (tempo per prendere i 18k giri)
                } else if (brakePressed) {
                    targetRpm = MIN_RPM;
                    accelerationFactor = 0.15; // Freno motore fortissimo
                } else {
                    // Minimo "ballerino"
                    targetRpm = MIN_RPM + (Math.random() - 0.5) * 80;
                    accelerationFactor = 0.015; // Ritorno al minimo naturale
                }
            } else {
                targetRpm = 0;
                accelerationFactor = 0.02; // Spegnimento
            }

            // Interpolazione lineare per i giri
            currentRpm += (targetRpm - currentRpm) * accelerationFactor;
            if (currentRpm < 10) currentRpm = 0; // Ferma completamente se < 10

            const displayRpm = Math.round(currentRpm);
            const hertz = (displayRpm / 60).toFixed(1);
            
            // Aggiornamento Telemetria UI
            rpmDisplay.textContent = displayRpm;
            hertzValue.textContent = hertz + " Hz";

            // Gestione Colori Zone Critiche
            canvasContainer.className = 'animation-section'; 
            rpmPanel.classList.remove('redline-active');

            if (displayRpm >= 16000) {
                // Zona 16k - 18k (Extreme Redline)
                rpmDisplay.style.color = "var(--accent-red)";
                rpmDisplay.style.textShadow = "0 0 35px rgba(255, 56, 56, 0.8)";
                canvasContainer.classList.add('shake-extreme');
                rpmPanel.classList.add('redline-active');
                statusValue.textContent = "LIMITE MECCANICO!";
                statusValue.style.color = "var(--accent-red)";
            } else if (displayRpm >= 11000) {
                // Zona di Potenza
                rpmDisplay.style.color = "var(--accent-orange)";
                rpmDisplay.style.textShadow = "0 0 25px rgba(255, 94, 0, 0.6)";
                canvasContainer.classList.add('shake-warning');
                statusValue.textContent = "Coppia Massima (Espansione in Risonanza)";
                statusValue.style.color = "var(--accent-orange)";
            } else if (displayRpm >= MIN_RPM - 100) {
                // Regime Basso/Medio
                rpmDisplay.style.color = "var(--accent-blue)";
                rpmDisplay.style.textShadow = "0 0 20px rgba(0, 229, 255, 0.4)";
                statusValue.textContent = brakePressed ? "Freno Motore Attivo" : (gasPressed ? "Salita Giri..." : "Regime di Minimo");
                statusValue.style.color = "var(--accent-blue)";
            } else {
                // Spento
                rpmDisplay.style.color = "var(--text-muted)";
                rpmDisplay.style.textShadow = "none";
                statusValue.textContent = isEngineRunning ? "Avviamento..." : "Spento";
                statusValue.style.color = "var(--text-muted)";
            }

            // Conversione RPM visiva
            let speed = 0;
            if (currentRpm > 0) {
                const visualRpmScale = Math.pow(currentRpm / 5000, 0.85); 
                speed = visualRpmScale * 0.35; 
            }
            
            angle += speed;
            if (angle >= Math.PI * 2) angle -= Math.PI * 2;

            // Calcolo posizioni meccaniche
            const crankX = cx + crankRadius * Math.sin(angle);
            const crankY = cy - crankRadius * Math.cos(angle);
            const pistY = crankY - Math.sqrt(conrodLen**2 - (crankX - cx)**2);

            // Analisi Dinamica Fasi
            if (displayRpm > 100) {
                let phase = "";
                let phaseColor = "";
                if (angle > 0 && angle <= Math.PI) {
                    if (angle < 0.6) {
                        phase = "<strong>ESPANSIONE:</strong> A 18.000 RPM questa fase avviene 300 volte al secondo. Lo shock termico scaraventa il pistone in basso.";
                        phaseColor = "var(--accent-orange)";
                    } else if (angle < 2.4) {
                        phase = "<strong>SCARICO E RISONANZA:</strong> L'estrattore conico della marmitta aspira brutalmente i gas esausti dal cilindro.";
                        phaseColor = "#747d8c";
                    } else {
                        phase = "<strong>TRAVASO:</strong> La pressione nel carter pompa proietta miscela atomizzata a velocità soniche verso la candela.";
                        phaseColor = "var(--accent-blue)";
                    }
                } else {
                    if (angle < Math.PI + 1.6) {
                        phase = "<strong>COMPRESSIONE:</strong> Banda di squish al limite. Pressioni altissime comprimono l'aria e la benzina ad alti ottani.";
                        phaseColor = "var(--accent-blue)";
                    } else {
                        phase = "<strong>ASPIRAZIONE:</strong> Le lamelle in carbonio si spalancano richiamando quantità enormi di carburante nel carter.";
                        phaseColor = "var(--accent-blue)";
                    }
                }
                dynamicText.innerHTML = phase;
                dynamicText.style.borderLeftColor = phaseColor;
            } else if (!isEngineRunning) {
                dynamicText.innerHTML = "Motore spento. Premi <strong>ACCENDI</strong> e usa i <strong>PEDALI</strong> per pilotare il motore.";
                dynamicText.style.borderLeftColor = "var(--text-muted)";
            }

            // --- RENDER ORDER CANVA ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFluids(pistY, angle, currentRpm);
            drawEngineBlock();
            drawMovingParts(pistY, crankX, crankY, angle);

            // Scintilla in base agli RPM
            if (isEngineRunning && currentRpm > 100) {
                const sparkWindow = currentRpm > 12000 ? 0.6 : 0.3; // Scintilla più evidente ad alti giri
                if (angle < sparkWindow || angle > Math.PI * 2 - 0.1) {
                    drawSpark(currentRpm);
                }
            }

            requestAnimationFrame(draw);
        }

        // === DISEGNO MECCANICO ===
        function drawEngineBlock() {
            ctx.lineWidth = 3; ctx.strokeStyle = "#4b4f58";
            for(let i=0; i<8; i++) {
                const fy = cylTop + 10 + (i*20);
                const w = 55 + Math.sin(i * 0.5) * 10;
                ctx.beginPath();
                ctx.moveTo(cx - 55, fy); ctx.lineTo(cx - 55 - w, fy);
                ctx.moveTo(cx + 55, fy); ctx.lineTo(cx + 55 + w, fy);
                ctx.stroke();
            }

            const blockGrad = ctx.createLinearGradient(cx - 100, 0, cx + 100, 0);
            blockGrad.addColorStop(0, "#8395a7");
            blockGrad.addColorStop(0.5, "#c8d6e5");
            blockGrad.addColorStop(1, "#576574");
            
            ctx.lineWidth = 10; ctx.strokeStyle = blockGrad; ctx.lineJoin = "round";

            ctx.beginPath(); ctx.arc(cx, cy, 95, -Math.PI/4.2, Math.PI + Math.PI/4.2); ctx.stroke(); // Carter
            
            // Parete Sx (Travasi)
            ctx.beginPath();
            ctx.moveTo(cx - 55, cy - 70); ctx.lineTo(cx - 55, 310);
            ctx.lineTo(cx - 100, 310); ctx.lineTo(cx - 100, 195); 
            ctx.lineTo(cx - 55, 195); ctx.lineTo(cx - 55, cylTop);
            ctx.stroke();

            // Parete Dx (Scarico e Pacco Lamellare)
            ctx.beginPath();
            ctx.moveTo(cx + 55, cylTop); ctx.lineTo(cx + 55, 180); 
            ctx.moveTo(cx + 55, 235); ctx.lineTo(cx + 55, 320); 
            ctx.moveTo(cx + 55, 380); ctx.lineTo(cx + 55, cy - 70);
            ctx.stroke();

            ctx.beginPath(); // Testata Squish
            ctx.moveTo(cx - 55, cylTop); ctx.lineTo(cx - 20, cylTop - 20);
            ctx.lineTo(cx + 20, cylTop - 20); ctx.lineTo(cx + 55, cylTop);
            ctx.stroke();

            // Espansione (Marmitta)
            ctx.lineWidth = 4; ctx.strokeStyle = "#a4b0be"; ctx.beginPath();
            ctx.moveTo(cx + 55, 180); ctx.lineTo(cx + 130, 160); ctx.lineTo(cx + 180, 150);
            ctx.moveTo(cx + 55, 235); ctx.lineTo(cx + 130, 250); ctx.lineTo(cx + 180, 260);
            ctx.stroke();

            // Pacco Lamellare
            ctx.strokeStyle = "#57606f"; ctx.fillStyle = "#111"; ctx.beginPath();
            ctx.moveTo(cx + 55, 320); ctx.lineTo(cx + 120, 310);
            ctx.moveTo(cx + 55, 380); ctx.lineTo(cx + 120, 390); ctx.stroke();
            ctx.fillRect(cx + 60, 330, 25, 40);
            ctx.strokeStyle = "#fbc531"; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(cx + 85, 330); ctx.lineTo(cx + 65, 350);
            ctx.moveTo(cx + 85, 370); ctx.lineTo(cx + 65, 350); ctx.stroke();

            // Candela Racing
            ctx.fillStyle = "#ffffff"; ctx.fillRect(cx - 12, cylTop - 55, 24, 35);
            ctx.fillStyle = "#ff3838"; ctx.beginPath(); ctx.roundRect(cx - 18, cylTop - 75, 36, 25, 5); ctx.fill();
            ctx.strokeStyle = "#2f3542"; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(cx, cylTop - 75); ctx.quadraticCurveTo(cx - 30, cylTop - 120, cx - 80, cylTop - 100); ctx.stroke();
            ctx.fillStyle = "#2f3542"; ctx.fillRect(cx - 4, cylTop - 20, 8, 10);
        }

        function drawMovingParts(pistY, crankX, crankY, angle) {
            const crankGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 40);
            crankGrad.addColorStop(0, "#f1f2f6"); crankGrad.addColorStop(1, "#2f3542");

            ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.fillStyle = crankGrad; ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy, 60, angle - Math.PI/2.1, angle + Math.PI/2.1);
            ctx.lineWidth = 30; ctx.strokeStyle = "#1e272e"; ctx.stroke();
            
            // Biella Profilo H
            ctx.translate(cx, pistY);
            const a = Math.atan2(crankY - pistY, crankX - cx);
            ctx.rotate(a - Math.PI/2);
            const dist = Math.sqrt((crankX-cx)**2 + (crankY-pistY)**2);
            
            ctx.fillStyle = "#747d8c"; ctx.strokeStyle = "#2f3542"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-18, dist); ctx.lineTo(18, dist); ctx.lineTo(12, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#2f3542"; ctx.beginPath(); ctx.moveTo(-5, 15); ctx.lineTo(-8, dist - 15); ctx.lineTo(8, dist - 15); ctx.lineTo(5, 15); ctx.fill();

            ctx.rotate(-(a - Math.PI/2)); ctx.translate(-cx, -pistY);

            ctx.beginPath(); ctx.arc(crankX, crankY, 14, 0, Math.PI*2);
            ctx.fillStyle = "#1e272e"; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = "#a4b0be"; ctx.stroke();

            // Pistone Monofascia
            const pistTop = pistY - pistH/2;
            const pistGrad = ctx.createLinearGradient(cx - pistW/2, 0, cx + pistW/2, 0);
            pistGrad.addColorStop(0, "#576574"); pistGrad.addColorStop(0.5, "#ffffff"); pistGrad.addColorStop(1, "#2f3542");

            ctx.fillStyle = pistGrad; ctx.beginPath(); ctx.moveTo(cx - pistW/2, pistTop + 5);
            ctx.quadraticCurveTo(cx, pistTop - 2, cx + pistW/2, pistTop + 5);
            ctx.lineTo(cx + pistW/2, pistY + pistH/2); ctx.lineTo(cx - pistW/2, pistY + pistH/2);
            ctx.closePath(); ctx.fill();

            ctx.fillStyle = "#111"; ctx.fillRect(cx - pistW/2 - 1.5, pistTop + 12, pistW + 3, 5); // Fascia elastica

            ctx.beginPath(); ctx.arc(cx, pistY - 5, 12, 0, Math.PI*2);
            ctx.fillStyle = "#1a1c23"; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, pistY + 25, 8, 0, Math.PI*2);
            ctx.fillStyle = "#0a0a0c"; ctx.fill();
        }

        function drawFluids(pistY, angle, rpm) {
            const pistTop = pistY - pistH/2;
            const pistBottom = pistY + pistH/2;
            const intensity = Math.min(1, rpm / 8000);

            if(rpm < 100) return;

            // Combustione ed Espulsione
            if (angle > 0 && angle < Math.PI / 2) {
                const fireGrad = ctx.createRadialGradient(cx, cylTop, 5, cx, cylTop, 180 + (intensity * 60));
                fireGrad.addColorStop(0, "#ffffff"); fireGrad.addColorStop(0.1, "rgba(255, 200, 0, 0.9)");
                fireGrad.addColorStop(0.4, "rgba(255, 69, 0, 0.7)"); fireGrad.addColorStop(1, "rgba(0, 0, 0, 0)");
                ctx.fillStyle = fireGrad;
            } else if (angle >= Math.PI / 2 && angle < Math.PI) {
                ctx.fillStyle = `rgba(116, 125, 140, ${0.6 + intensity * 0.3})`;
            } else {
                const comp = 1 - ((pistTop - cylTop) / (340 - cylTop)); 
                ctx.fillStyle = `rgba(0, 229, 255, ${0.1 + (comp * 0.8)})`;
            }
            ctx.fillRect(cx - 53, cylTop - 20, 106, pistTop - cylTop + 30);

            // Scarico
            if (pistTop > 180 && angle > 1) {
                const exhaustGrad = ctx.createLinearGradient(cx + 55, 0, cx + 180, 0);
                exhaustGrad.addColorStop(0, `rgba(116, 125, 140, ${0.8 * intensity})`); exhaustGrad.addColorStop(1, "rgba(116, 125, 140, 0)");
                ctx.fillStyle = exhaustGrad; ctx.beginPath();
                ctx.moveTo(cx + 55, 180); ctx.lineTo(cx + 180, 150); ctx.lineTo(cx + 180, 260); ctx.lineTo(cx + 55, 235); ctx.fill();
            }

            // Carter e Travasi (Colorati di blu acceso ad alti giri)
            ctx.fillStyle = `rgba(0, 229, 255, ${0.3 + intensity * 0.3})`;
            ctx.beginPath(); ctx.arc(cx, cy, 93, 0, Math.PI*2); ctx.fill();
            ctx.fillRect(cx - 53, pistBottom, 106, (cy-93) - pistBottom + 95);

            if (pistBottom < 380) { ctx.fillStyle = `rgba(0, 229, 255, ${0.6 * intensity})`; ctx.fillRect(cx + 55, 320, 65, 60); }
            if (pistTop > 195) { ctx.fillStyle = `rgba(0, 229, 255, ${0.8 * intensity})`; ctx.fillRect(cx - 100, 195, 45, 115); }
        }

        function drawSpark(rpm) {
            const sparkColor = rpm > 14000 ? "#00e5ff" : "#ffffff"; // Diventa bluastra agli estremi
            ctx.shadowColor = sparkColor; ctx.shadowBlur = 40; ctx.strokeStyle = sparkColor; ctx.lineWidth = rpm > 12000 ? 5 : 2; 
            
            ctx.beginPath(); ctx.moveTo(cx, cylTop - 10);
            let currentY = cylTop - 10, currentX = cx;
            while(currentY < cylTop + 30) {
                currentY += Math.random() * 10 + 5;
                currentX += (Math.random() - 0.5) * 20;
                ctx.lineTo(currentX, currentY);
            }
            ctx.stroke();

            ctx.shadowBlur = 60; ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(cx, cylTop + 5, 8, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0; 
        }

        requestAnimationFrame(draw);
    </script>
</body>
