<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex Junior Rok 125cc - Debugged & Working</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060709; --panel-bg: #12141c; --text-main: #f3f4f6;
            --text-muted: #8a94a6; --accent-blue: #38bdf8; --accent-green: #34d399;
            --accent-orange: #fb923c; --accent-red: #ef4444; --border-color: #242936;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-color);
            color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 50% -10%, #1e293b 0%, var(--bg-color) 80%);
            overflow-x: hidden;
        }

        header {
            padding: 1rem; text-align: center; border-bottom: 1px solid var(--border-color);
            background: rgba(6, 7, 9, 0.9); z-index: 10;
        }

        h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .subtitle { font-size: 0.75rem; color: var(--accent-orange); letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }

        .container { display: flex; flex-wrap: wrap; max-width: 1400px; margin: 1.5rem auto; gap: 1.5rem; padding: 0 1rem; flex: 1; }

        .animation-section {
            flex: 1 1 500px; background: radial-gradient(circle at center, #111827 0%, #020617 100%);
            border-radius: 16px; padding: 1rem; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid #1e293b; position: relative;
        }

        canvas { max-width: 100%; height: auto; display: block; filter: contrast(1.1) saturate(1.1); }

        .controls-section { flex: 1 1 450px; display: flex; flex-direction: column; gap: 1rem; }

        .panel { background: var(--panel-bg); padding: 1.2rem; border-radius: 16px; border: 1px solid var(--border-color); position: relative; }
        .panel::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green), var(--accent-red)); }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 0.5rem; }
        .panel h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }

        .audio-switch {
            background: #2563eb; border: 1px solid #3b82f6; color: #fff; padding: 10px 15px;
            font-size: 0.85rem; font-weight: 800; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .audio-switch.ready { background: #059669; border-color: #10b981; }

        .engine-switch {
            background: #334155; border: 1px solid #475569; color: #fff; padding: 10px 20px;
            font-size: 0.85rem; font-weight: 800; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: 0.2s; width: 120px; text-align: center;
        }
        .engine-switch.on { background: #10b981; border-color: #34d399; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .engine-switch.seized { background: var(--accent-red); border-color: #f87171; animation: pulse 1s infinite alternate; }

        @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }

        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.8rem; }
        .dyno-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }

        .display-box { background: #0b0f19; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: flex-end; }
        .display-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; align-self: flex-start; margin-bottom: 0.3rem; }
        .display-value { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 800; line-height: 1; }
        
        .dyno-box { background: rgba(15, 23, 42, 0.6); padding: 0.6rem; border-radius: 6px; border: 1px solid #1e293b; text-align: center; }
        .dyno-val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 800; color: #fff; }
        .dyno-lbl { font-size: 0.65rem; color: var(--accent-orange); text-transform: uppercase; font-weight: 700; margin-top: 2px; }

        .display-value.rpm { color: var(--accent-blue); }
        .display-value.speed { color: var(--accent-green); }
        .display-value.temp { color: #facc15; transition: color 0.3s; }

        .bar-container { width: 100%; height: 5px; background: #1e293b; border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
        .bar-fill { height: 100%; transition: width 0.1s linear, background-color 0.3s; }
        .bar-fill.rpm { background: linear-gradient(90deg, var(--accent-blue), var(--accent-red)); }
        .bar-fill.speed { background: linear-gradient(90deg, var(--accent-green), var(--accent-blue)); }
        .bar-fill.temp { background: var(--accent-blue); }

        .pedals-container { display: flex; gap: 1rem; margin-top: 0.5rem; }
        .pedal {
            flex: 1; padding: 1.5rem 1rem; text-align: center; border-radius: 10px; font-weight: 800; font-size: 1.2rem;
            letter-spacing: 1px; cursor: pointer; user-select: none; transition: 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.6); opacity: 0.3; pointer-events: none;
        }
        .pedal.active { opacity: 1; pointer-events: auto; }
        .pedal:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0); filter: brightness(1.2); }
        .gas-pedal { background: var(--accent-green); color: #022c22; border: 1px solid #6ee7b7; }
        .brake-pedal { background: var(--accent-red); color: #fff; border: 1px solid #f87171; }

        .physics-log { font-size: 0.8rem; line-height: 1.5; padding: 1rem; background: rgba(0,0,0,0.4); border-left: 3px solid var(--accent-blue); border-radius: 0 8px 8px 0; margin-top: 1rem; color: #cbd5e1; min-height: 80px; }
        .physics-log strong { color: #fff; }

        @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>Vortex Junior Rok 125cc</h1>
        <div class="subtitle">Simulazione Termodinamica Pro 2T</div>
    </header>

    <main class="container">
        <section class="animation-section" id="canvasContainer">
            <canvas id="engineCanvas" width="600" height="700"></canvas>
        </section>

        <section class="controls-section">
            <div class="panel">
                <div class="panel-header">
                    <button class="audio-switch" id="audioBtn">🔊 ATTIVA AUDIO</button>
                    <button class="engine-switch" id="engineBtn">Start</button>
                </div>
                
                <div class="dash-grid">
                    <div class="display-box">
                        <div class="display-label">Giri Motore (RPM)</div>
                        <div class="display-value rpm" id="rpmValue">0</div>
                        <div class="bar-container"><div class="bar-fill rpm" id="rpmBar" style="width: 0%"></div></div>
                    </div>
                    <div class="display-box">
                        <div class="display-label">Velocità (KM/H)</div>
                        <div class="display-value speed" id="speedValue">0</div>
                        <div class="bar-container"><div class="bar-fill speed" id="speedBar" style="width: 0%"></div></div>
                    </div>
                </div>

                <div class="display-box" style="margin-bottom: 1rem; flex-direction: row; justify-content: space-between; align-items: center;">
                    <div style="display:flex; flex-direction: column;">
                        <div class="display-label">Temp. Acqua (H2O)</div>
                        <div class="bar-container" style="width: 150px; margin-top: 0;"><div class="bar-fill temp" id="tempBar" style="width: 15%"></div></div>
                    </div>
                    <div class="display-value temp" id="tempValue">20.0°</div>
                </div>

                <div class="panel-header" style="margin-bottom: 0.5rem; margin-top: 1rem;">
                    <h2>Banco Prova (Dati in Tempo Reale)</h2>
                </div>
                <div class="dyno-grid">
                    <div class="dyno-box">
                        <div class="dyno-val" id="hpValue">0.0</div>
                        <div class="dyno-lbl">Cavalli (HP)</div>
                    </div>
                    <div class="dyno-box">
                        <div class="dyno-val" id="kwValue">0.0</div>
                        <div class="dyno-lbl">Potenza (kW)</div>
                    </div>
                    <div class="dyno-box">
                        <div class="dyno-val" id="nmValue">0.0</div>
                        <div class="dyno-lbl">Coppia (Nm)</div>
                    </div>
                </div>
                
                <div class="pedals-container">
                    <div class="pedal brake-pedal" id="brakePedal">FRENO</div>
                    <div class="pedal gas-pedal" id="gasPedal">GAS</div>
                </div>

                <div class="physics-log" id="physicsText">
                    Passo 1: Clicca su <strong>ATTIVA AUDIO</strong>.<br>Passo 2: Clicca su <strong>START</strong> per accendere.
                </div>
            </div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');
        
        const rpmDisplay = document.getElementById('rpmValue');
        const speedDisplay = document.getElementById('speedValue');
        const tempDisplay = document.getElementById('tempValue');
        const rpmBar = document.getElementById('rpmBar');
        const speedBar = document.getElementById('speedBar');
        const tempBar = document.getElementById('tempBar');
        
        const hpValue = document.getElementById('hpValue');
        const kwValue = document.getElementById('kwValue');
        const nmValue = document.getElementById('nmValue');
        
        const physicsText = document.getElementById('physicsText');
        const audioBtn = document.getElementById('audioBtn');
        const engineBtn = document.getElementById('engineBtn');
        const gasPedal = document.getElementById('gasPedal');
        const brakePedal = document.getElementById('brakePedal');

        const cx = 300, cy = 520, crankRadius = 54, conrodLen = 132, pistW = 94, pistH = 75, cylTop = 200;       

        let angle = 0;
        let isEngineRunning = false;
        let isSeized = false; 
        let seizureType = ""; 
        let coldSeizureRisk = 0; 
        let hotSeizureRisk = 0; 

        let engineRpm = 0;
        let speedKmh = 0;
        let waterTemp = 20.0; 
        
        const MIN_RPM = 2800; 
        const MAX_RPM = 13800;
        const MAX_SPEED = 122; 
        const CLUTCH_BITE = 4200; 
        const RPM_PER_KMH = MAX_RPM / MAX_SPEED; 

        let gasPressed = false;
        let brakePressed = false;

        // --- MOTORE AUDIO REVISIONATO ---
        let audioCtx = null;
        let mainOsc = null;
        let subOsc = null;
        let noiseNode = null;
        let mainGain = null;
        let noiseFilter = null;
        let noiseGain = null;

        function createNoiseBuffer() {
            let size = 44100 * 2;
            let buffer = audioCtx.createBuffer(1, size, 44100);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < size; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            return buffer;
        }

        audioBtn.addEventListener('click', () => {
            if (!audioCtx) {
                // Inizializzazione sicura cross-browser
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                
                mainOsc = audioCtx.createOscillator();
                mainOsc.type = 'sawtooth';
                
                subOsc = audioCtx.createOscillator();
                subOsc.type = 'sawtooth';

                noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = createNoiseBuffer();
                noiseNode.loop = true;

                noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.Q.setValueAtTime(4, audioCtx.currentTime);

                noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0, audioCtx.currentTime);

                mainGain = audioCtx.createGain();
                mainGain.gain.setValueAtTime(0, audioCtx.currentTime);

                mainOsc.connect(mainGain);
                subOsc.connect(mainGain);
                noiseNode.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                
                mainGain.connect(audioCtx.destination);
                noiseGain.connect(audioCtx.destination);

                mainOsc.start(0);
                subOsc.start(0);
                noiseNode.start(0);
            }
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            audioBtn.textContent = "✅ AUDIO PRONTO";
            audioBtn.className = "audio-switch ready";
            physicsText.innerHTML = "Audio sbloccato! Ora premi <strong>START</strong> per accendere il kart.";
        });

        function updateAudio() {
            if (!audioCtx || audioCtx.state === 'suspended') return;

            if (isEngineRunning && engineRpm > 100 && !isSeized) {
                let hz = 50 + (engineRpm / MAX_RPM) * 280;
                
                mainOsc.frequency.setTargetAtTime(hz, audioCtx.currentTime, 0.02);
                subOsc.frequency.setTargetAtTime(hz * 0.5, audioCtx.currentTime, 0.02);

                let filterFreq = 200 + (engineRpm / MAX_RPM) * 900 + (gasPressed ? 500 : 0);
                noiseFilter.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.03);

                let targetMainVol = gasPressed ? 0.45 : 0.12;
                let targetNoiseVol = gasPressed ? 0.20 : 0.04;

                if (engineRpm < 3800) {
                    let crackle = 1 + Math.sin(audioCtx.currentTime * 40) * 0.4;
                    targetMainVol *= crackle;
                }

                mainGain.gain.setTargetAtTime(targetMainVol, audioCtx.currentTime, 0.03);
                noiseGain.gain.setTargetAtTime(targetNoiseVol, audioCtx.currentTime, 0.03);
            } else {
                mainGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
                noiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            }
        }

        // --- SISTEMA DI INPUT CORRETTO (SENZA ERRORI SINTATTICI) ---
        function bindPedal(element, isGas) {
            const press = (e) => { 
                e.preventDefault(); 
                if(isEngineRunning && !isSeized) { 
                    if(isGas) gasPressed = true; else brakePressed = true; 
                } 
            };
            const release = (e) => { 
                e.preventDefault(); 
                if(isGas) gasPressed = false; else brakePressed = false; 
            };
            
            element.addEventListener('mousedown', press); 
            element.addEventListener('mouseup', release); 
            element.addEventListener('mouseleave', release);
            
            element.addEventListener('touchstart', press, {passive: false}); 
            element.addEventListener('touchend', release, {passive: false});
        }
        
        bindPedal(gasPedal, true); 
        bindPedal(brakePedal, false);

        engineBtn.addEventListener('click', () => {
            if (isSeized) {
                isSeized = false; seizureType = ""; coldSeizureRisk = 0; hotSeizureRisk = 0;
                waterTemp = 20.0; engineRpm = 0; speedKmh = 0;
                engineBtn.textContent = "Start"; engineBtn.className = "engine-switch";
                physicsText.innerHTML = "Motore rigenerato. Premi <strong>START</strong>.";
                return;
            }

            isEngineRunning = !isEngineRunning;
            if (isEngineRunning) {
                gasPedal.classList.add('active'); 
                brakePedal.classList.add('active');
                engineBtn.textContent = "Stop"; 
                engineBtn.className = "engine-switch on";
                if(engineRpm < MIN_RPM) engineRpm = MIN_RPM; // Avvio istantaneo al minimo
            } else {
                gasPedal.classList.remove('active'); 
                brakePedal.classList.remove('active');
                gasPressed = false; 
                brakePressed = false;
                engineBtn.textContent = "Start"; 
                engineBtn.className = "engine-switch";
            }
        });

        function updatePhysics() {
            if (isSeized) {
                engineRpm = 0; gasPressed = false;
                speedKmh -= speedKmh * 0.08;
                if(speedKmh < 0.5) speedKmh = 0;
                return;
            }

            let currentNm = 0; let currentHp = 0; let currentKw = 0;

            if (isEngineRunning && engineRpm > 1000) {
                let baseNm = 5; 
                let boostNm = 12.5 * Math.exp(-Math.pow((engineRpm - 10500) / 2800, 2)); 
                let loadFactor = (engineRpm > CLUTCH_BITE && speedKmh > 5) ? 1.0 : 0.6;
                if (!gasPressed) loadFactor = 0.1;

                currentNm = (baseNm + boostNm) * loadFactor;
                if(engineRpm > 13500) currentNm *= (1 - (engineRpm - 13500)/300);
                if(currentNm < 0) currentNm = 0;

                currentHp = (currentNm * engineRpm) / 7120;
                currentKw = currentHp * 0.7457;
            }

            hpValue.textContent = currentHp.toFixed(1);
            kwValue.textContent = currentKw.toFixed(1);
            nmValue.textContent = currentNm.toFixed(1);

            if (isEngineRunning) {
                let baseHeat = 0.002; 
                let frictionHeat = Math.pow((engineRpm / MAX_RPM), 2) * 0.016; 
                let powerHeat = currentHp * 0.0045; 
                let heatGen = baseHeat + frictionHeat + powerHeat; 
                
                let airflowCooling = (speedKmh / MAX_SPEED) * 0.075; 
                let thermostatFactor = 1.0;
                
                if (waterTemp < 45) {
                    thermostatFactor = 0.08; 
                } else if (waterTemp < 62) {
                    thermostatFactor = 0.08 + ((waterTemp - 45) / 17) * 0.92;
                }
                airflowCooling *= thermostatFactor;
                let passiveCooling = (waterTemp - 20) * 0.0002; 
                
                waterTemp += heatGen - airflowCooling - passiveCooling;
            } else {
                waterTemp -= (waterTemp - 20) * 0.0005; 
            }
            
            if (waterTemp < 20) waterTemp = 20.0;
            if (waterTemp > 115) waterTemp = 115.0; 

            if (isEngineRunning) {
                if (waterTemp < 42 && engineRpm > 8500 && gasPressed) {
                    coldSeizureRisk += (engineRpm - 8500) * 0.00008; 
                    if (coldSeizureRisk >= 1.0) {
                        isSeized = true; seizureType = "FREDDO"; isEngineRunning = false;
                    }
                } else {
                    coldSeizureRisk = Math.max(0, coldSeizureRisk - 0.003);
                }

                if (waterTemp > 94) {
                    let thermalLoad = (waterTemp - 94) * 0.0006;
                    if (gasPressed) thermalLoad *= 2.5;
                    hotSeizureRisk += thermalLoad;
                    
                    if (hotSeizureRisk >= 1.0 || waterTemp > 108) {
                        isSeized = true; seizureType = "CALDO"; isEngineRunning = false;
                    }
                } else {
                    hotSeizureRisk = Math.max(0, hotSeizureRisk - 0.005);
                }
            }

            if (!isEngineRunning) {
                engineRpm -= engineRpm * 0.05;
                speedKmh -= speedKmh * 0.01;
                return;
            }

            let aeroDrag = (speedKmh * speedKmh) * 0.000035; 
            let rollingDrag = 0.08; 

            if (speedKmh < 8) { 
                if (gasPressed) {
                    engineRpm += 550; 
                    if (engineRpm > CLUTCH_BITE) {
                        speedKmh += 0.85; engineRpm -= 180; 
                    }
                } else if (brakePressed) {
                    speedKmh = 0; engineRpm += (MIN_RPM - engineRpm) * 0.15;
                } else {
                    speedKmh -= rollingDrag; engineRpm += (MIN_RPM - engineRpm) * 0.1;
                }
                if (speedKmh < 0) speedKmh = 0;
            } else {
                if (gasPressed) {
                    let push = currentNm / 7.8; 
                    speedKmh += push - aeroDrag - rollingDrag;
                } else if (brakePressed) {
                    speedKmh -= 2.8; 
                } else {
                    speedKmh -= (aeroDrag + rollingDrag + 0.2); 
                }
                
                if (speedKmh > MAX_SPEED) speedKmh = MAX_SPEED;
                if (speedKmh < 0) speedKmh = 0;

                let targetRpm = speedKmh * RPM_PER_KMH;
                engineRpm += (targetRpm - engineRpm) * 0.4;
            }

            if (engineRpm > MAX_RPM) engineRpm = MAX_RPM - (Math.random()*150); 
            if (engineRpm < MIN_RPM && isEngineRunning && speedKmh < 2) engineRpm = MIN_RPM + (Math.random()*50);
        }

        function updateUI() {
            let rpmDisp = Math.round(engineRpm);
            let speedDisp = Math.floor(speedKmh);
            let tempDisp = waterTemp.toFixed(1);

            rpmDisplay.textContent = rpmDisp;
            speedDisplay.textContent = speedDisp;
            tempDisplay.textContent = tempDisp + "°";

            rpmBar.style.width = (rpmDisp / MAX_RPM) * 100 + "%";
            speedBar.style.width = (speedKmh / MAX_SPEED) * 100 + "%";
            tempBar.style.width = Math.min(100, (waterTemp - 20) / 80 * 100) + "%";

            if (waterTemp < 40) {
                tempBar.style.background = "var(--accent-blue)"; tempDisplay.style.color = "var(--accent-blue)";
            } else if (waterTemp < 55) {
                tempBar.style.background = "var(--accent-green)"; tempDisplay.style.color = "var(--accent-green)";
            } else {
                tempBar.style.background = "var(--accent-red)"; tempDisplay.style.color = "var(--accent-red)";
            }

            if (isSeized) {
                engineBtn.textContent = "RIPARA / RESET";
                engineBtn.className = "engine-switch seized";
                gasPedal.classList.remove('active'); brakePedal.classList.remove('active');
            }

            let logHtml = "";
            if (isSeized) {
                if (seizureType === "FREDDO") {
                    logHtml = "<span style='color:var(--accent-red); font-weight:800;'>💥 GRIPPAGGIO DA FREDDO!</span><br>Pistone stampato a " + tempDisp + "°C.";
                } else {
                    logHtml = "<span style='color:var(--accent-red); font-weight:800;'>🔥 GRIPPAGGIO DA CALDO!</span><br>Fuso a " + tempDisp + "°C.";
                }
            } else if (!isEngineRunning) {
                logHtml = "Motore pronto.";
            } else {
                if (coldSeizureRisk > 0.4) {
                    logHtml = "<span style='color:var(--accent-blue); font-weight:800;'>⚠️ MOTORE FREDDO!</span><br>Rischio grippata imminente ad alti RPM!";
                } else if (hotSeizureRisk > 0.4 || waterTemp > 92) {
                    logHtml = "<span style='color:var(--accent-red); font-weight:800;'>⚠️ SURRISCALDAMENTO!</span><br>Riduci il gas.";
                } else if (rpmDisp > 10500) {
                    logHtml = "<strong>IN COPPIA FULL GAS</strong>";
                } else if (speedKmh < 8) {
                    logHtml = "<strong>MINIMO SCOPPIETTANTE</strong>";
                } else {
                    logHtml = "<strong>IN ACCELERAZIONE</strong>";
                }
            }
            if(physicsText.innerHTML !== logHtml) physicsText.innerHTML = logHtml;
        }

        function draw() {
            updatePhysics();
            updateUI();
            updateAudio();

            if (engineRpm > 0 && !isSeized) {
                angle += (engineRpm / 60) * 0.075; 
                if (angle >= Math.PI * 2) angle -= Math.PI * 2;
            }
            
            const crankX = cx + crankRadius * Math.sin(angle);
            const crankY = cy - crankRadius * Math.cos(angle);
            let deltaX = Math.abs(crankX - cx); if (deltaX > conrodLen) deltaX = conrodLen;
            const pistY = crankY - Math.sqrt(Math.pow(conrodLen, 2) - Math.pow(deltaX, 2));

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawEngineBlockAndCooling(engineRpm > 8800 && !isSeized, waterTemp);
            drawCombustion(pistY, angle, engineRpm);
            drawMovingParts(pistY, crankX, crankY);
            
            if (isEngineRunning && engineRpm > 500 && !isSeized) {
                if (angle < 0.25 || angle > Math.PI * 2 - 0.25) drawRealisticSpark();
            }

            requestAnimationFrame(draw);
        }

        function drawEngineBlockAndCooling(valveOpen, temp) {
            ctx.fillStyle = "#1e293b"; ctx.fillRect(cx - 100, cylTop + 10, 200, cy - cylTop - 80);
            ctx.fillStyle = "#0c0f17"; ctx.fillRect(cx - pistW/2 - 4, cylTop, pistW + 8, cy - cylTop);

            let heatRatio = Math.max(0, Math.min(1, (temp - 20) / 70));
            let r = Math.floor(2 + (230 * heatRatio)); let g = Math.floor(132 - (100 * heatRatio)); let b = Math.floor(199 - (150 * heatRatio));
            if (isSeized && seizureType === "CALDO") { r = 255; g = 50; b = 50; }

            const waterGrad = ctx.createLinearGradient(0, cylTop, 0, cy - 80);
            waterGrad.addColorStop(0, `rgb(${r}, ${g}, ${b})`); waterGrad.addColorStop(1, `rgb(${Math.floor(r*0.5)}, ${Math.floor(g*0.5)}, ${Math.floor(b*0.5)})`);
            ctx.fillStyle = waterGrad; ctx.fillRect(cx - 95, cylTop + 15, 35, cy - cylTop - 95); ctx.fillRect(cx + 60, cylTop + 15, 35, cy - cylTop - 95); 

            const headGrad = ctx.createLinearGradient(cx - 100, 0, cx + 100, 0);
            headGrad.addColorStop(0, "#475569"); headGrad.addColorStop(0.5, "#94a3b8"); headGrad.addColorStop(1, "#334155");
            ctx.fillStyle = headGrad; ctx.beginPath(); ctx.moveTo(cx - 100, cylTop + 10); ctx.lineTo(cx - 100, cylTop - 30); ctx.lineTo(cx - 30, cylTop - 30); ctx.lineTo(cx + 30, cylTop - 30); ctx.lineTo(cx + 100, cylTop - 30); ctx.lineTo(cx + 100, cylTop + 10); ctx.lineTo(cx + pistW/2, cylTop); ctx.lineTo(cx + 20, cylTop - 15); ctx.lineTo(cx - 20, cylTop - 15); ctx.lineTo(cx - pistW/2, cylTop); ctx.closePath(); ctx.fill();

            ctx.fillStyle = "#334155"; ctx.fillRect(cx - 12, cylTop - 30, 24, 15); ctx.fillStyle = "#cbd5e1"; ctx.fillRect(cx - 14, cylTop - 32, 28, 2); ctx.fillStyle = "#f8fafc"; ctx.fillRect(cx - 10, cylTop - 75, 20, 30); ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.roundRect(cx - 12, cylTop - 100, 24, 20, 4); ctx.fill();
            
            const exhaustGrad = ctx.createLinearGradient(cx + pistW/2, 220, cx + 180, 220); exhaustGrad.addColorStop(0, "#1e293b"); exhaustGrad.addColorStop(0.5, "#334155"); exhaustGrad.addColorStop(1, "#0f172a"); ctx.fillStyle = exhaustGrad; ctx.beginPath(); ctx.moveTo(cx + pistW/2 + 4, 215); ctx.lineTo(cx + 160, 190); ctx.lineTo(cx + 160, 280); ctx.lineTo(cx + pistW/2 + 4, 275); ctx.closePath(); ctx.fill();
        }

        function drawCombustion(pistY, angle, rpm) {
            if (rpm < 100 || isSeized) return; 
            const pistTop = pistY - pistH/2; let fillHeight = Math.max(0, pistTop - cylTop);
            if (angle >= 0 && angle < 0.8) { 
                const fire = ctx.createRadialGradient(cx, cylTop, 0, cx, cylTop + 60, 120); 
                fire.addColorStop(0, "#ffffff"); fire.addColorStop(0.1, "#fde047"); fire.addColorStop(0.4, "rgba(239, 68, 68, 0.9)"); fire.addColorStop(1, "rgba(0,0,0,0)"); 
                ctx.fillStyle = fire; ctx.fillRect(cx - pistW/2, cylTop, pistW, fillHeight); 
            } else if (angle >= 0.8 && angle <= Math.PI) { 
                ctx.fillStyle = `rgba(30, 41, 59, 0.4)`; ctx.fillRect(cx - pistW/2, cylTop, pistW, fillHeight); 
            }
        }

        function drawMovingParts(pistY, crankX, crankY) {
            ctx.fillStyle = "#020617"; ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI * 2); ctx.fill(); 
            const crankGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 54); crankGrad.addColorStop(0, "#94a3b8"); crankGrad.addColorStop(1, "#334155"); 
            ctx.fillStyle = crankGrad; ctx.beginPath(); ctx.arc(cx, cy, 54, 0, Math.PI * 2); ctx.fill();
            
            ctx.lineWidth = 14; ctx.strokeStyle = "#475569"; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(crankX, crankY); ctx.lineTo(cx, pistY); ctx.stroke(); 
            
            const pistTop = pistY - pistH/2; const pistGrad = ctx.createLinearGradient(cx - pistW/2, 0, cx + pistW/2, 0); 
            
            if (isSeized) {
                pistGrad.addColorStop(0, "#450a0a"); pistGrad.addColorStop(0.5, "#ef4444"); pistGrad.addColorStop(1, "#450a0a");
            } else {
                pistGrad.addColorStop(0, "#1e293b"); pistGrad.addColorStop(0.5, "#94a3b8"); pistGrad.addColorStop(1, "#1e293b");
            }
            
            ctx.fillStyle = pistGrad; ctx.beginPath(); ctx.moveTo(cx - pistW/2, pistTop + 5); ctx.quadraticCurveTo(cx, pistTop - 5, cx + pistW/2, pistTop + 5); ctx.lineTo(cx + pistW/2, pistTop + pistH); ctx.lineTo(cx - pistW/2, pistTop + pistH); ctx.closePath(); ctx.fill();
            ctx.fillStyle = "#020617"; ctx.fillRect(cx - pistW/2 - 1, pistTop + 12, pistW + 2, 3);
            
            ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(cx, pistY, 14, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#cbd5e1"; ctx.beginPath(); ctx.arc(cx, pistY, 10, 0, Math.PI * 2); ctx.fill();
        }

        function drawRealisticSpark() {
            ctx.shadowColor = "#38bdf8"; ctx.shadowBlur = 15; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(cx - 1, cylTop - 5); ctx.lineTo(cx + 4, cylTop - 1); ctx.lineTo(cx - 2, cylTop + 3); ctx.stroke(); ctx.shadowBlur = 0;
        }

        requestAnimationFrame(draw);
    </script>
</body>
