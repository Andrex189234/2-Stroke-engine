<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulatore 2 Tempi - HARDCORE PHYSICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111214;
            --text-main: #f1f2f6;
            --text-muted: #747d8c;
            --accent-blue: #00e5ff;   
            --accent-orange: #ff5e00; 
            --accent-red: #ff3838;    
            --border-color: #22252a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% -10%, #1a1c23 0%, var(--bg-color) 80%);
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #747d8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle { font-size: 0.9rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 2rem auto;
            gap: 2rem;
            padding: 0 1.5rem;
            flex: 1;
        }

        .animation-section {
            flex: 1 1 550px;
            background: radial-gradient(circle at center, #1a1c23 0%, #0a0a0c 100%);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid #2f3542;
            position: relative;
        }

        canvas { max-width: 100%; height: auto; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); }

        @keyframes extreme-vibration {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-3px, 3px) rotate(-0.6deg); }
            50% { transform: translate(3px, -3px) rotate(0.6deg); }
            75% { transform: translate(-3px, -3px) rotate(-0.6deg); }
            100% { transform: translate(3px, 3px) rotate(0deg); }
        }
        .shake-warning { animation: extreme-vibration 0.04s infinite; }
        .shake-extreme { animation: extreme-vibration 0.015s infinite; filter: blur(1px) drop-shadow(0 0 35px rgba(255,56,56,0.7)); }

        .controls-section {
            flex: 1 1 450px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .panel.redline-active {
            border-color: var(--accent-red);
            box-shadow: 0 0 40px rgba(255, 56, 56, 0.3);
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-orange), var(--accent-red));
        }

        .panel h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .engine-switch {
            background: #2f3542; border: 2px solid #57606f; color: #fff; padding: 10px 20px;
            font-size: 0.9rem; font-weight: 800; text-transform: uppercase; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 0 #1e272e; letter-spacing: 1px;
        }
        .engine-switch:active { transform: translateY(4px); box-shadow: 0 0 0 #1e272e; }
        .engine-switch.on { background: #2ed573; border-color: #7bed9f; box-shadow: 0 4px 0 #218c74, 0 0 20px rgba(46, 213, 115, 0.4); }
        .engine-switch.broken { background: var(--accent-red); border-color: #ff7675; cursor: not-allowed; box-shadow: none; }

        .rpm-display-wrapper {
            display: flex; align-items: baseline; justify-content: flex-end; gap: 10px;
            margin-bottom: 1rem; background: #0a0a0c; padding: 1rem; border-radius: 8px; border: 1px inset #222;
        }

        .rpm-display { font-family: 'JetBrains Mono', monospace; font-size: 4.5rem; font-weight: 800; color: var(--accent-blue); text-shadow: 0 0 20px rgba(0, 229, 255, 0.4); line-height: 1; font-variant-numeric: tabular-nums; }
        .rpm-unit { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; color: var(--text-muted); font-weight: 700; }

        .temp-container {
            background: #0a0a0c; padding: 1rem; border-radius: 8px; border: 1px inset #222; margin-bottom: 1.5rem;
        }
        .temp-header { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .temp-bar-bg { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        .temp-bar-fill { width: 0%; height: 100%; background: #2ed573; transition: background-color 0.1s ease; }

        .pedals-container { display: flex; gap: 1.5rem; margin-top: 1rem; }
        .pedal {
            flex: 1; padding: 2rem 1rem; text-align: center; border-radius: 12px; font-weight: 800; font-size: 1.4rem;
            letter-spacing: 2px; cursor: pointer; user-select: none; transition: transform 0.1s, filter 0.2s, box-shadow 0.1s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.6); opacity: 0.3; pointer-events: none;
        }
        .pedal.active { opacity: 1; pointer-events: auto; }
        .pedal:active { transform: translateY(8px); box-shadow: 0 0 0 rgba(0,0,0,0.6); filter: brightness(1.2); }

        .gas-pedal { background: #2ed573; color: #000; border: 2px solid #7bed9f; }
        .brake-pedal { background: #ff4757; color: #fff; border: 2px solid #ff7f50; }

        .dynamic-phase { font-size: 1rem; line-height: 1.6; padding: 1.5rem; background: rgba(0,0,0,0.4); border-left: 4px solid var(--text-muted); border-radius: 0 8px 8px 0; min-height: 130px; font-weight: 300; }
        .dynamic-phase strong { font-weight: 600; color: #fff; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-muted); }
        .stat-value { color: #fff; font-weight: 700; font-size: 1.1rem; }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .rpm-display { font-size: 3rem; }
            .pedal { padding: 1.5rem 1rem; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Motore 2 Tempi - Uncapped Physics</h1>
        <div class="subtitle">Nessun Limitatore • Meccanica di Grippaggio a Freddo Rigida</div>
    </header>

    <main class="container">
        <section class="animation-section" id="canvasContainer">
            <canvas id="engineCanvas" width="650" height="750"></canvas>
        </section>

        <section class="controls-section">
            <div class="panel" id="rpmPanel">
                <h2>
                    Telemetria
                    <button class="engine-switch" id="engineBtn">Accendi</button>
                </h2>
                
                <div class="rpm-display-wrapper">
                    <div class="rpm-display" id="rpmValue">0</div>
                    <div class="rpm-unit">RPM</div>
                </div>

                <div class="temp-container">
                    <div class="temp-header">
                        <span>TEMPERATURA GRUPPO TERMICO</span>
                        <span id="tempValue">25 °C</span>
                    </div>
                    <div class="temp-bar-bg">
                        <div class="temp-bar-fill" id="tempBar"></div>
                    </div>
                </div>
                
                <div class="pedals-container">
                    <div class="pedal brake-pedal" id="brakePedal">FRENO</div>
                    <div class="pedal gas-pedal" id="gasPedal">GAS</div>
                </div>

                <div class="stats-grid">
                    <div>Stato Termico:<br><span class="stat-value" id="thermalState">Freddo</span></div>
                    <div>Diagnostica:<br><span class="stat-value" id="statusValue">Spento</span></div>
                </div>
            </div>

            <div class="panel">
                <h2>Analisi Meccanica Real-Time</h2>
                <div class="dynamic-phase" id="dynamicText">
                    Motore spento. Effettua il warm-up iniziale prima di dare gas.
                </div>
            </div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const rpmDisplay = document.getElementById('rpmValue');
        const tempDisplay = document.getElementById('tempValue');
        const tempBar = document.getElementById('tempBar');
        const dynamicText = document.getElementById('dynamicText');
        const canvasContainer = document.getElementById('canvasContainer');
        const rpmPanel = document.getElementById('rpmPanel');
        const thermalState = document.getElementById('thermalState');
        const statusValue = document.getElementById('statusValue');
        const engineBtn = document.getElementById('engineBtn');
        const gasPedal = document.getElementById('gasPedal');
        const brakePedal = document.getElementById('brakePedal');

        // Geometria
        const cx = 325, cy = 550, crankRadius = 60, conrodLen = 185, pistW = 104, pistH = 90, cylTop = 160;       

        // Stato Motore
        let angle = 0;
        let lastTime = performance.now();
        let isEngineRunning = false;
        
        // Stati di Guasto Meccanico
        let damageType = null; // "freddo", "caldo", "esploso"
        
        let currentRpm = 0;           
        const MIN_RPM = 1600;         
        const ABSOLUTE_MAX_RPM = 36000; // Limite strutturale dei materiali

        const AMBIENT_TEMP = 25;
        let currentTemp = AMBIENT_TEMP;

        let gasPressed = false;
        let brakePressed = false;

        function bindPedal(element, isGas) {
            const press = (e) => { e.preventDefault(); if(isEngineRunning && !damageType) { if(isGas) gasPressed = true; else brakePressed = true; } };
            const release = (e) => { e.preventDefault(); if(isGas) gasPressed = false; else brakePressed = false; };
            element.addEventListener('mousedown', press);
            element.addEventListener('mouseup', release);
            element.addEventListener('mouseleave', release);
            element.addEventListener('touchstart', press, {passive: false});
            element.addEventListener('touchend', release, {passive: false});
        }
        bindPedal(gasPedal, true);
        bindPedal(brakePedal, false);

        engineBtn.addEventListener('click', () => {
            if (damageType) return; 
            isEngineRunning = !isEngineRunning;
            if (isEngineRunning) {
                engineBtn.textContent = "Spegni";
                engineBtn.classList.add('on');
                gasPedal.classList.add('active');
                brakePedal.classList.add('active');
            } else {
                spegniInterfacce();
            }
        });

        function spegniInterfacce() {
            engineBtn.textContent = "Accendi";
            engineBtn.classList.remove('on');
            gasPedal.classList.remove('active');
            brakePedal.classList.remove('active');
            gasPressed = false;
            brakePressed = false;
        }

        function draw(time) {
            const dt = time - lastTime;
            lastTime = time;

            // 1. DINAMICA DI ROTAZIONE UNCAP (SENZA LIMITI)
            let targetRpm = 0;
            let accelerationFactor = 0.01; 

            if (isEngineRunning && !damageType) {
                if (gasPressed) {
                    // Curva di accelerazione infinita: più sale, più spinge
                    targetRpm = currentRpm + 4000; 
                    if (targetRpm > 45000) targetRpm = 45000;
                    accelerationFactor = 0.035; 
                } else if (brakePressed) {
                    targetRpm = MIN_RPM;
                    accelerationFactor = 0.2; 
                } else {
                    targetRpm = MIN_RPM + (Math.random() - 0.5) * 80;
                    accelerationFactor = 0.02; 
                }
            } else if (damageType) {
                targetRpm = 0;
                accelerationFactor = damageType === "esploso" ? 0.7 : 0.4; // L'esplosione o il grippaggio bloccano tutto istantaneamente
            } else {
                targetRpm = 0;
                accelerationFactor = 0.02; 
            }

            currentRpm += (targetRpm - currentRpm) * accelerationFactor;
            if (currentRpm < 10) currentRpm = 0;

            const displayRpm = Math.round(currentRpm);
            rpmDisplay.textContent = displayRpm;

            // 2. SIMULAZIONE TERMICA AVANZATA
            if (isEngineRunning && !damageType) {
                // Calore generato dalla combustione pura e dagli attriti stellari ad alti giri
                let combustionHeat = Math.pow(currentRpm / 15000, 2) * (gasPressed ? 1.2 : 0.2);
                // Dissipazione (aria sui carter + ventola virtuale che aumenta coi giri)
                let thermalDissipation = 0.03 + (currentRpm / 20000) * 0.08 + (currentTemp - AMBIENT_TEMP) * 0.002;
                currentTemp += (combustionHeat - thermalDissipation);
            } else {
                // Raffreddamento naturale a motore spento
                currentTemp -= (currentTemp - AMBIENT_TEMP) * 0.003;
            }
            if (currentTemp < AMBIENT_TEMP) currentTemp = AMBIENT_TEMP;

            // UI Temperatura e Stati Termici
            tempDisplay.textContent = Math.round(currentTemp) + " °C";
            const tempPercentage = Math.min(100, ((currentTemp - AMBIENT_TEMP) / (140 - AMBIENT_TEMP)) * 100);
            tempBar.style.width = tempPercentage + "%";
            
            if (currentTemp < 55) {
                thermalState.textContent = "FREDDO (Rischio Seizure)";
                thermalState.style.color = "#00e5ff";
                tempBar.style.backgroundColor = "#00e5ff";
            } else if (currentTemp >= 55 && currentTemp <= 90) {
                thermalState.textContent = "OTTIMALE (Warm)";
                thermalState.style.color = "#2ed573";
                tempBar.style.backgroundColor = "#2ed573";
            } else if (currentTemp > 90 && currentTemp < 125) {
                thermalState.textContent = "SURRISCALDATO";
                thermalState.style.color = "var(--accent-orange)";
                tempBar.style.backgroundColor = "var(--accent-orange)";
            } else {
                thermalState.textContent = "CRITICO FUSIONE";
                thermalState.style.color = "var(--accent-red)";
                tempBar.style.backgroundColor = "var(--accent-red)";
            }

            // 3. LOGICA DI CONTROLLO DANNI (REALISMO PURO)
            if (!damageType && isEngineRunning) {
                // A: GRIPPAGGIO A FREDDO (Gas spalancato ad alti giri quando il cilindro è freddo)
                if (currentTemp < 55 && currentRpm > 7500 && gasPressed) {
                    damageType = "freddo";
                    isEngineRunning = false;
                    spegniInterfacce();
                }
                // B: GRIPPAGGIO DA SURRISCALDAMENTO
                else if (currentTemp >= 135) {
                    damageType = "caldo";
                    isEngineRunning = false;
                    spegniInterfacce();
                }
                // C: ESPLOSIONE MECCANICA OLTRE I LINGOTTI DI TOLLERANZA (36k RPM)
                else if (currentRpm >= ABSOLUTE_MAX_RPM) {
                    damageType = "esploso";
                    isEngineRunning = false;
                    spegniInterfacce();
                }
            }

            // Reset del blocco quando il motore si raffredda (solo per i grippaggi, non per l'esplosione!)
            if ((damageType === "freddo" || damageType === "caldo") && currentTemp < 60) {
                damageType = null;
                engineBtn.textContent = "Accendi";
                engineBtn.classList.remove('broken');
            }

            // Feedback Grafici e Scuotimento in base alle anomalie
            canvasContainer.className = 'animation-section';
            rpmPanel.classList.remove('redline-active');

            if (damageType) {
                engineBtn.classList.add('broken');
                if (damageType === "freddo") {
                    engineBtn.textContent = "GRIPPATO A FREDDO";
                    statusValue.textContent = "BLOCCO TERMICO RECENTE";
                    statusValue.style.color = "var(--accent-red)";
                    dynamicText.innerHTML = "<strong>GRIPPAGGIO A FREDDO:</strong> Hai dato gas a motore freddo (<55°C). Il pistone si è dilatato istantaneamente mentre il cilindro era ancora contratto, azzerando la tolleranza. Attendi il raffreddamento.";
                } else if (damageType === "caldo") {
                    engineBtn.textContent = "GRIPPATO DA CALDO";
                    statusValue.textContent = "VELO D'OLIO ROTTO";
                    statusValue.style.color = "var(--accent-red)";
                    dynamicText.innerHTML = "<strong>GRIPPAGGIO TERMICO:</strong> La temperatura ha superato i 135°C. Il velo di lubrificante della miscela è evaporato, causando la fusione metallica immediata di fascia e camicia.";
                } else if (damageType === "esploso") {
                    engineBtn.textContent = "BIELLA SPEZZATA";
                    statusValue.textContent = "CEDIMENTO STRUTTURALE";
                    statusValue.style.color = "var(--accent-red)";
                    dynamicText.innerHTML = "<strong>MOTORE PLURIDISTRUTTO:</strong> Hai superato i 36.000 RPM. La forza centrifuga sull'asse del piede di biella ha superato il carico di rottura del titanio. Il motore è irrecuperabile, rinfresca la pagina.";
                }
            } else {
                // Funzionamento Normale
                if (displayRpm >= 25000) {
                    canvasContainer.classList.add('shake-extreme');
                    rpmPanel.classList.add('redline-active');
                    statusValue.textContent = "RPM ESTREMI (Rischio Esplosione!)";
                    statusValue.style.color = "var(--accent-red)";
                } else if (displayRpm >= 14000) {
                    canvasContainer.classList.add('shake-warning');
                    statusValue.textContent = "In Risonanza Plena";
                    statusValue.style.color = "var(--accent-orange)";
                } else if (displayRpm >= MIN_RPM - 100) {
                    statusValue.textContent = gasPressed ? "Accelerazione Libera" : "Minimo Regolare";
                    statusValue.style.color = "var(--accent-blue)";
                } else {
                    statusValue.textContent = isEngineRunning ? "Avviamento..." : "Spento";
                    statusValue.style.color = "var(--text-muted)";
                }
            }

            // Rotazione Meccanica
            let speed = 0;
            if (currentRpm > 0 && damageType !== "esploso") {
                speed = Math.pow(currentRpm / 5000, 0.85) * 0.35; 
            }
            angle += speed;
            if (angle >= Math.PI * 2) angle -= Math.PI * 2;

            const crankX = cx + crankRadius * Math.sin(angle);
            const crankY = cy - crankRadius * Math.cos(angle);
            const pistY = crankY - Math.sqrt(conrodLen**2 - (crankX - cx)**2);

            // Descrizione Fasi Fluidodinamiche
            if (displayRpm > 100 && !damageType) {
                let phase = "", phaseColor = "";
                if (angle > 0 && angle <= Math.PI) {
                    if (angle < 0.6) {
                        phase = `<strong>ESPANSIONE:</strong> Regime libero. L'assenza di limitatore fa sì che ad ogni ciclo la vampa spinga con frequenze mai viste.`;
                        phaseColor = "var(--accent-orange)";
                    } else {
                        phase = "<strong>SCARICO E TRAVASO:</strong> Il motore sta respirando a flussi cinematici ultra-rapidi.";
                        phaseColor = "#747d8c";
                    }
                } else {
                    phase = "<strong>COMPRESSIONE:</strong> Compressione volumetrica estrema nel carter e nella camera superiore.";
                    phaseColor = "var(--accent-blue)";
                }
                dynamicText.innerHTML = phase;
                dynamicText.style.borderLeftColor = phaseColor;
            }

            // Disegno Render Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFluids(pistY, angle, currentRpm, currentTemp);
            drawEngineBlock(currentTemp);
            drawMovingParts(pistY, crankX, crankY, angle);

            if (isEngineRunning && currentRpm > 100 && !damageType) {
                if (angle < (currentRpm > 20000 ? 0.8 : 0.3) || angle > Math.PI * 2 - 0.1) {
                    drawSpark(currentRpm);
                }
            }

            requestAnimationFrame(draw);
        }

        function drawEngineBlock(temp) {
            const thermalFactor = Math.min(1, Math.max(0, (temp - 60) / 70)); 
            const r = Math.floor(75 + (thermalFactor * 130));
            const g = Math.floor(79 - (thermalFactor * 50));
            const b = Math.floor(88 - (thermalFactor * 60));
            
            ctx.lineWidth = 3; ctx.strokeStyle = `rgb(${r},${g},${b})`;
            for(let i=0; i<8; i++) {
                const fy = cylTop + 10 + (i*20);
                const w = 55 + Math.sin(i * 0.5) * 10;
                ctx.beginPath(); ctx.moveTo(cx - 55, fy); ctx.lineTo(cx - 55 - w, fy);
                ctx.moveTo(cx + 55, fy); ctx.lineTo(cx + 55 + w, fy); ctx.stroke();
            }

            ctx.lineWidth = 10; ctx.strokeStyle = "#576574"; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.arc(cx, cy, 95, -Math.PI/4.2, Math.PI + Math.PI/4.2); ctx.stroke(); 
            
            ctx.beginPath(); // Cilindro Sx
            ctx.moveTo(cx - 55, cy - 70); ctx.lineTo(cx - 55, 310); ctx.lineTo(cx - 100, 310);
            ctx.lineTo(cx - 100, 195); ctx.lineTo(cx - 55, 195); ctx.lineTo(cx - 55, cylTop); ctx.stroke();

            ctx.beginPath(); // Cilindro Dx
            ctx.moveTo(cx + 55, cylTop); ctx.lineTo(cx + 55, 180); 
            ctx.moveTo(cx + 55, 235); ctx.lineTo(cx + 55, 320); 
            ctx.moveTo(cx + 55, 380); ctx.lineTo(cx + 55, cy - 70); ctx.stroke();

            ctx.beginPath(); // Testa
            ctx.moveTo(cx - 55, cylTop); ctx.lineTo(cx - 20, cylTop - 20); ctx.lineTo(cx + 20, cylTop - 20); ctx.lineTo(cx + 55, cylTop); ctx.stroke();

            // Collettore Marmitta arrossato se caldo
            ctx.lineWidth = 4; ctx.strokeStyle = `rgb(${164+(thermalFactor*70)},${176-(thermalFactor*60)},${190-(thermalFactor*80)})`;
            ctx.beginPath(); ctx.moveTo(cx + 55, 180); ctx.lineTo(cx + 130, 160); ctx.lineTo(cx + 180, 150);
            ctx.moveTo(cx + 55, 235); ctx.lineTo(cx + 130, 250); ctx.lineTo(cx + 180, 260); ctx.stroke();

            // Pacco Lamellare
            ctx.strokeStyle = "#57606f"; ctx.beginPath(); ctx.moveTo(cx + 55, 320); ctx.lineTo(cx + 120, 310); ctx.moveTo(cx + 55, 380); ctx.lineTo(cx + 120, 390); ctx.stroke();
        }

        function drawMovingParts(pistY, crankX, crankY, angle) {
            // Se esploso, non disegna l'albero coerente (simula la rottura)
            if (damageType === "esploso") {
                ctx.fillStyle = "var(--accent-red)";
                ctx.font = "bold 24px JetBrains Mono";
                ctx.fillText("BIELLA CISAILLATA", cx - 110, cy);
                return;
            }

            ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.fillStyle = "#2f3542"; ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy, 60, angle - Math.PI/2.1, angle + Math.PI/2.1);
            ctx.lineWidth = 30; ctx.strokeStyle = "#1e272e"; ctx.stroke();
            
            ctx.translate(cx, pistY);
            const a = Math.atan2(crankY - pistY, crankX - cx);
            ctx.rotate(a - Math.PI/2);
            const dist = Math.sqrt((crankX-cx)**2 + (crankY-pistY)**2);
            
            ctx.fillStyle = "#747d8c"; ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-18, dist); ctx.lineTo(18, dist); ctx.lineTo(12, 0); ctx.closePath(); ctx.fill();

            ctx.rotate(-(a - Math.PI/2)); ctx.translate(-cx, -pistY);
            ctx.beginPath(); ctx.arc(crankX, crankY, 14, 0, Math.PI*2); ctx.fillStyle = "#a4b0be"; ctx.fill();

            // Pistone
            const pistTop = pistY - pistH/2;
            const pistGrad = ctx.createLinearGradient(cx - pistW/2, 0, cx + pistW/2, 0);
            
            if (damageType === "freddo" || damageType === "caldo") {
                pistGrad.addColorStop(0, "#ff3838"); pistGrad.addColorStop(0.5, "#ff9f43"); pistGrad.addColorStop(1, "#ff3838");
            } else {
                pistGrad.addColorStop(0, "#576574"); pistGrad.addColorStop(0.5, "#ffffff"); pistGrad.addColorStop(1, "#2f3542");
            }

            ctx.fillStyle = pistGrad; ctx.beginPath(); ctx.moveTo(cx - pistW/2, pistTop + 5);
            ctx.quadraticCurveTo(cx, pistTop - 2, cx + pistW/2, pistTop + 5);
            ctx.lineTo(cx + pistW/2, pistY + pistH/2); ctx.lineTo(cx - pistW/2, pistY + pistH/2);
            ctx.closePath(); ctx.fill();
        }

        function drawFluids(pistY, angle, rpm, temp) {
            const pistTop = pistY - pistH/2;
            const pistBottom = pistY + pistH/2;
            const intensity = Math.min(1, rpm / 15000);
            const thermalFactor = Math.min(1, Math.max(0, (temp - 60) / 70));

            if(rpm < 100 || damageType) return;

            if (angle > 0 && angle < Math.PI / 2) {
                const fireGrad = ctx.createRadialGradient(cx, cylTop, 5, cx, cylTop, 180 + (intensity * 80));
                fireGrad.addColorStop(0, "#ffffff");
                fireGrad.addColorStop(0.2, `rgb(255, ${230 - (thermalFactor*130)}, 30)`);
                fireGrad.addColorStop(0.6, `rgb(${255}, ${69 - (thermalFactor*69)}, 0)`);
                fireGrad.addColorStop(1, "rgba(0, 0, 0, 0)");
                ctx.fillStyle = fireGrad;
            } else if (angle >= Math.PI / 2 && angle < Math.PI) {
                ctx.fillStyle = `rgba(116, 125, 140, ${0.5 + intensity * 0.4})`;
            } else {
                const comp = 1 - ((pistTop - cylTop) / (340 - cylTop)); 
                ctx.fillStyle = `rgba(0, 229, 255, ${0.1 + (comp * 0.8)})`;
            }
            ctx.fillRect(cx - 52, cylTop - 20, 104, pistTop - cylTop + 25);

            if (pistTop > 180 && angle > 1) {
                const exhaustGrad = ctx.createLinearGradient(cx + 55, 0, cx + 180, 0);
                exhaustGrad.addColorStop(0, `rgba(${116 + (thermalFactor * 139)}, ${125 - (thermalFactor * 50)}, 140, ${0.8 * intensity})`);
                exhaustGrad.addColorStop(1, "rgba(0, 0, 0, 0)");
                ctx.fillStyle = exhaustGrad; ctx.beginPath();
                ctx.moveTo(cx + 55, 180); ctx.lineTo(cx + 180, 150); ctx.lineTo(cx + 180, 260); ctx.lineTo(cx + 55, 235); ctx.fill();
            }

            ctx.fillStyle = `rgba(0, 229, 255, ${0.3 + intensity * 0.3})`;
            ctx.beginPath(); ctx.arc(cx, cy, 93, 0, Math.PI*2); ctx.fill();
            ctx.fillRect(cx - 52, pistBottom, 104, (cy-93) - pistBottom + 95);
        }

        function drawSpark(rpm) {
            const sparkColor = rpm > 22000 ? "#00e5ff" : "#ffffff";
            ctx.shadowColor = sparkColor; ctx.shadowBlur = 40; ctx.strokeStyle = sparkColor; ctx.lineWidth = rpm > 20000 ? 6 : 2; 
            ctx.beginPath(); ctx.moveTo(cx, cylTop - 10);
            let currentY = cylTop - 10, currentX = cx;
            while(currentY < cylTop + 30) {
                currentY += Math.random() * 10 + 4; currentX += (Math.random() - 0.5) * 25;
                ctx.lineTo(currentX, currentY);
            }
            ctx.stroke(); ctx.shadowBlur = 0; 
        }

        requestAnimationFrame(draw);
    </script>
</body>
