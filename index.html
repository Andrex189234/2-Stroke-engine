<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Motore 2 Tempi - Racing 16k RPM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111214;
            --text-main: #f1f2f6;
            --text-muted: #747d8c;
            --accent-blue: #00e5ff;   /* Miscela */
            --accent-orange: #ff5e00; /* Combustione */
            --accent-red: #ff3838;    /* Redline Extreme */
            --border-color: #22252a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% -10%, #1a1c23 0%, var(--bg-color) 80%);
            overflow-x: hidden;
        }

        header {
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #747d8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle { font-size: 0.9rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 2rem auto;
            gap: 2rem;
            padding: 0 1.5rem;
            flex: 1;
        }

        /* Sezione Grafica (Engine) */
        .animation-section {
            flex: 1 1 600px;
            background: radial-gradient(circle at center, #1a1c23 0%, #0a0a0c 100%);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid #2f3542;
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
            transition: filter 0.2s;
        }

        /* Effetti Vibrazione Redline */
        @keyframes extreme-vibration {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-1.5px, 1.5px) rotate(-0.3deg); }
            50% { transform: translate(1.5px, -1.5px) rotate(0.3deg); }
            75% { transform: translate(-1.5px, -1.5px) rotate(-0.3deg); }
            100% { transform: translate(1.5px, 1.5px) rotate(0deg); }
        }

        .shake-warning { animation: extreme-vibration 0.08s infinite; }
        .shake-extreme { animation: extreme-vibration 0.04s infinite; filter: blur(0.5px) drop-shadow(0 0 15px rgba(255,56,56,0.3)); }

        /* Controlli e Telemetria */
        .controls-section {
            flex: 1 1 450px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .panel.redline-active {
            border-color: var(--accent-red);
            box-shadow: 0 0 30px rgba(255, 56, 56, 0.15);
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-orange), var(--accent-red));
        }

        .panel h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        /* Display RPM Numerico */
        .rpm-display-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .rpm-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--accent-blue);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            transition: color 0.1s;
        }

        .rpm-unit {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Slider Racing */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin-top: 20px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #fff;
            border: 6px solid var(--accent-orange);
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.8);
            transition: border-color 0.2s, transform 0.1s;
        }

        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.1); }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: linear-gradient(90deg, #22252a 0%, #22252a 75%, var(--accent-red) 100%);
            border-radius: 4px;
        }

        /* Testo Analisi */
        .dynamic-phase {
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 1.5rem;
            background: rgba(0,0,0,0.4);
            border-left: 4px solid var(--accent-blue);
            border-radius: 0 8px 8px 0;
            min-height: 140px;
            font-weight: 300;
        }
        .dynamic-phase strong { font-weight: 600; color: #fff; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .stat-value { color: #fff; font-weight: 700; font-size: 1.2rem; }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .rpm-display { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Motore 2 Tempi Competizione</h1>
        <div class="subtitle">Simulatore Fluidodinamico • Limitatore: 16.000 RPM</div>
    </header>

    <main class="container">
        <section class="animation-section" id="canvasContainer">
            <canvas id="engineCanvas" width="650" height="750"></canvas>
        </section>

        <section class="controls-section">
            <div class="panel" id="rpmPanel">
                <h2>Comando Gas <span id="alertText" style="color: var(--accent-red); opacity: 0;">ZONA ROSSA!</span></h2>
                
                <div class="rpm-display-wrapper">
                    <div class="rpm-display" id="rpmValue">1500</div>
                    <div class="rpm-unit">RPM</div>
                </div>
                
                <input type="range" id="rpmRange" min="0" max="16000" value="1500" step="50">

                <div class="stats-grid">
                    <div>Cicli al secondo:<br><span class="stat-value" id="hertzValue">25 Hz</span></div>
                    <div>Stato Motore:<br><span class="stat-value" id="statusValue" style="color: var(--accent-blue);">Regime Minimo</span></div>
                </div>
            </div>

            <div class="panel">
                <h2>Analisi Ciclo Termodinamico</h2>
                <div class="dynamic-phase" id="dynamicText">
                    In attesa di accensione...
                </div>
            </div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');
        const rpmInput = document.getElementById('rpmRange');
        const rpmDisplay = document.getElementById('rpmValue');
        const dynamicText = document.getElementById('dynamicText');
        const canvasContainer = document.getElementById('canvasContainer');
        const rpmPanel = document.getElementById('rpmPanel');
        const alertText = document.getElementById('alertText');
        const hertzValue = document.getElementById('hertzValue');
        const statusValue = document.getElementById('statusValue');

        // Geometria Motore
        const cx = 325;           
        const cy = 550;           
        const crankRadius = 60;   // Corsa = 120
        const conrodLen = 185;    // Biella più lunga (competizione)
        const pistW = 104;         
        const pistH = 90;         
        const cylTop = 160;       

        let angle = 0;
        let lastTime = performance.now();

        function draw(time) {
            const dt = time - lastTime;
            lastTime = time;

            const rpm = parseInt(rpmInput.value);
            const hertz = (rpm / 60).toFixed(1);
            
            // Aggiornamento Telemetria UI
            rpmDisplay.textContent = rpm;
            hertzValue.textContent = hertz + " Hz";

            // Gestione Colori, Vibrazioni e Stato
            canvasContainer.className = 'animation-section'; // Reset classi
            rpmPanel.classList.remove('redline-active');
            alertText.style.opacity = 0;

            if (rpm >= 14000) {
                // Zona Extreme (14k - 16k)
                rpmDisplay.style.color = "var(--accent-red)";
                rpmDisplay.style.textShadow = "0 0 30px rgba(255, 56, 56, 0.7)";
                document.querySelector('input[type=range]::-webkit-slider-thumb').style.borderColor = "var(--accent-red)";
                canvasContainer.classList.add('shake-extreme');
                rpmPanel.classList.add('redline-active');
                alertText.style.opacity = 1;
                statusValue.textContent = "FUORI GIRI!";
                statusValue.style.color = "var(--accent-red)";
            } else if (rpm >= 10000) {
                // Zona Potenza Massima (10k - 14k)
                rpmDisplay.style.color = "var(--accent-orange)";
                rpmDisplay.style.textShadow = "0 0 25px rgba(255, 94, 0, 0.5)";
                document.querySelector('input[type=range]::-webkit-slider-thumb').style.borderColor = "var(--accent-orange)";
                canvasContainer.classList.add('shake-warning');
                statusValue.textContent = "Coppia Massima";
                statusValue.style.color = "var(--accent-orange)";
            } else if (rpm > 0) {
                // Regime Normale
                rpmDisplay.style.color = "var(--accent-blue)";
                rpmDisplay.style.textShadow = "0 0 20px rgba(0, 229, 255, 0.4)";
                document.querySelector('input[type=range]::-webkit-slider-thumb').style.borderColor = "var(--accent-blue)";
                statusValue.textContent = "Erogazione Regolare";
                statusValue.style.color = "var(--accent-blue)";
            } else {
                statusValue.textContent = "Spento";
                statusValue.style.color = "var(--text-muted)";
            }

            // A 16.000 giri calcoliamo un incremento visivo non lineare per evitare che il canvas sembri fermarsi per aliasing stroboscopico
            const visualRpmScale = Math.pow(rpm / 5000, 0.85); 
            const speed = visualRpmScale * 0.35; 
            
            angle += speed;
            if (angle >= Math.PI * 2) angle -= Math.PI * 2;

            // Cinematica esatta
            const crankX = cx + crankRadius * Math.sin(angle);
            const crankY = cy - crankRadius * Math.cos(angle);
            const pistY = crankY - Math.sqrt(conrodLen**2 - (crankX - cx)**2);

            // Testo Dinamico
            let phase = "";
            let phaseColor = "";
            if (angle > 0 && angle <= Math.PI) {
                if (angle < 0.6) {
                    phase = "<strong>ESPANSIONE:</strong> Lo scoppio genera temperature estreme (oltre 2000°C). La pressione violenta scaglia il pistone forgiato verso il basso.";
                    phaseColor = "var(--accent-orange)";
                } else if (angle < 2.4) {
                    phase = "<strong>SCARICO E RISONANZA:</strong> I gas a pressione escono nel cono di espansione. La marmitta crea un'onda di risonanza che estrarrà i gas con una forza pari a quella di un aspirapolvere industriale.";
                    phaseColor = "#747d8c";
                } else {
                    phase = "<strong>LAVAGGIO (TRAVASO):</strong> Con pressioni nel carter perfette, i travasi sparano miscela fresca nebulizzata a mach 0.3 contro la testata, spazzando via i gas combusti.";
                    phaseColor = "var(--accent-blue)";
                }
            } else {
                if (angle < Math.PI + 1.6) {
                    phase = "<strong>COMPRESSIONE:</strong> Luci chiuse. Il rapporto di compressione estremo schiaccia le molecole di aria e benzina nella banda di squish, pronte a esplodere.";
                    phaseColor = "var(--accent-blue)";
                } else {
                    phase = "<strong>ASPIRAZIONE LAMELLARE:</strong> Il vuoto nel carter apre le valvole in carbonio del pacco lamellare. Il carburatore inietta una miscela letale di aria, benzina ad alti ottani e olio sintetico.";
                    phaseColor = "var(--accent-blue)";
                }
            }

            if (rpm > 0) {
                dynamicText.innerHTML = phase;
                dynamicText.style.borderLeftColor = phaseColor;
            }

            // --- RENDER ORDER ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFluids(pistY, angle, rpm);
            drawEngineBlock();
            drawMovingParts(pistY, crankX, crankY, angle);

            // Scintilla (Trigger più aggressivo ad alti giri)
            if (rpm > 0) {
                const sparkWindow = rpm > 10000 ? 0.5 : 0.3;
                if (angle < sparkWindow || angle > Math.PI * 2 - 0.1) {
                    drawSpark(rpm);
                }
            }

            requestAnimationFrame(draw);
        }

        function drawEngineBlock() {
            // Alette di raffreddamento più dettagliate
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#4b4f58";
            for(let i=0; i<8; i++) {
                const fy = cylTop + 10 + (i*20);
                const w = 55 + Math.sin(i * 0.5) * 10; // Profilo curvo
                ctx.beginPath();
                ctx.moveTo(cx - 55, fy); ctx.lineTo(cx - 55 - w, fy);
                ctx.moveTo(cx + 55, fy); ctx.lineTo(cx + 55 + w, fy);
                ctx.stroke();
            }

            // Metallo del blocco
            const blockGrad = ctx.createLinearGradient(cx - 100, 0, cx + 100, 0);
            blockGrad.addColorStop(0, "#8395a7");
            blockGrad.addColorStop(0.5, "#c8d6e5");
            blockGrad.addColorStop(1, "#576574");
            
            ctx.lineWidth = 10;
            ctx.strokeStyle = blockGrad;
            ctx.lineJoin = "round";

            // Carter Inferiore (Profilo aerodinamico interno)
            ctx.beginPath();
            ctx.arc(cx, cy, 95, -Math.PI/4.2, Math.PI + Math.PI/4.2);
            ctx.stroke();

            // Parete Sx (Travasi Racing maggiorati)
            ctx.beginPath();
            ctx.moveTo(cx - 55, cy - 70); 
            ctx.lineTo(cx - 55, 310);
            ctx.lineTo(cx - 100, 310); // Volume travaso maggiore
            ctx.lineTo(cx - 100, 195); 
            ctx.lineTo(cx - 55, 195);
            ctx.lineTo(cx - 55, cylTop);
            ctx.stroke();

            // Parete Dx (Scarico espansione e Pacco Lamellare)
            ctx.beginPath();
            ctx.moveTo(cx + 55, cylTop);
            ctx.lineTo(cx + 55, 180); // Inizio Scarico
            ctx.moveTo(cx + 55, 235); // Fine Scarico
            ctx.lineTo(cx + 55, 320); // Inizio Aspirazione
            ctx.moveTo(cx + 55, 380); // Fine Aspirazione
            ctx.lineTo(cx + 55, cy - 70);
            ctx.stroke();

            // Cupola Testata (Banda di Squish)
            ctx.beginPath();
            ctx.moveTo(cx - 55, cylTop);
            ctx.lineTo(cx - 20, cylTop - 20);
            ctx.lineTo(cx + 20, cylTop - 20);
            ctx.lineTo(cx + 55, cylTop);
            ctx.stroke();

            // Cono Espansione Scarico (Marmitta Racing)
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#a4b0be";
            ctx.beginPath();
            ctx.moveTo(cx + 55, 180); 
            ctx.lineTo(cx + 130, 160); // Cono divergente
            ctx.lineTo(cx + 180, 150);
            ctx.moveTo(cx + 55, 235); 
            ctx.lineTo(cx + 130, 250); 
            ctx.lineTo(cx + 180, 260);
            ctx.stroke();

            // Collettore Aspirazione & Pacco Lamellare
            ctx.strokeStyle = "#57606f";
            ctx.fillStyle = "#111";
            ctx.beginPath();
            ctx.moveTo(cx + 55, 320); ctx.lineTo(cx + 120, 310);
            ctx.moveTo(cx + 55, 380); ctx.lineTo(cx + 120, 390);
            ctx.stroke();
            // Disegno Pacco lamellare
            ctx.fillRect(cx + 60, 330, 25, 40);
            ctx.strokeStyle = "#fbc531"; // Lamelle in carbonio/kevlar
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx + 85, 330); ctx.lineTo(cx + 65, 350);
            ctx.moveTo(cx + 85, 370); ctx.lineTo(cx + 65, 350);
            ctx.stroke();

            // Candela e Pipa
            ctx.fillStyle = "#ffffff"; // Ceramica
            ctx.fillRect(cx - 12, cylTop - 55, 24, 35);
            // Pipa candela rossa da competizione e cavo
            ctx.fillStyle = "#ff3838"; 
            ctx.beginPath(); ctx.roundRect(cx - 18, cylTop - 75, 36, 25, 5); ctx.fill();
            ctx.strokeStyle = "#2f3542"; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(cx, cylTop - 75); ctx.quadraticCurveTo(cx - 30, cylTop - 120, cx - 80, cylTop - 100); ctx.stroke();
            // Elettrodo
            ctx.fillStyle = "#2f3542";
            ctx.fillRect(cx - 4, cylTop - 20, 8, 10);
        }

        function drawMovingParts(pistY, crankX, crankY, angle) {
            // Albero Motore (Gradiente metallico radiale)
            const crankGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 40);
            crankGrad.addColorStop(0, "#f1f2f6");
            crankGrad.addColorStop(1, "#2f3542");

            ctx.beginPath();
            ctx.arc(cx, cy, 40, 0, Math.PI * 2);
            ctx.fillStyle = crankGrad;
            ctx.fill();

            // Contrappeso (Spalle Piene per alta pre-compressione)
            ctx.beginPath();
            ctx.arc(cx, cy, 60, angle - Math.PI/2.1, angle + Math.PI/2.1);
            ctx.lineWidth = 30;
            ctx.strokeStyle = "#1e272e";
            ctx.stroke();
            
            // BIELLA AD "H" (Design forgiato)
            ctx.translate(cx, pistY);
            const a = Math.atan2(crankY - pistY, crankX - cx);
            ctx.rotate(a - Math.PI/2);
            const dist = Math.sqrt((crankX-cx)**2 + (crankY-pistY)**2);
            
            ctx.fillStyle = "#747d8c";
            ctx.strokeStyle = "#2f3542";
            ctx.lineWidth = 2;
            
            // Profilo base biella
            ctx.beginPath();
            ctx.moveTo(-12, 0); ctx.lineTo(-18, dist);
            ctx.lineTo(18, dist); ctx.lineTo(12, 0);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // Scavo interno "H"
            ctx.fillStyle = "#2f3542";
            ctx.beginPath();
            ctx.moveTo(-5, 15); ctx.lineTo(-8, dist - 15);
            ctx.lineTo(8, dist - 15); ctx.lineTo(5, 15);
            ctx.fill();

            ctx.rotate(-(a - Math.PI/2));
            ctx.translate(-cx, -pistY);

            // Perno di manovella
            ctx.beginPath(); ctx.arc(crankX, crankY, 14, 0, Math.PI*2);
            ctx.fillStyle = "#1e272e"; ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = "#a4b0be"; ctx.stroke();

            // Pistone Racing (Testa piatta/leggermente bombata con monofascia)
            const pistTop = pistY - pistH/2;
            const pistGrad = ctx.createLinearGradient(cx - pistW/2, 0, cx + pistW/2, 0);
            pistGrad.addColorStop(0, "#576574");
            pistGrad.addColorStop(0.5, "#ffffff");
            pistGrad.addColorStop(1, "#2f3542");

            ctx.fillStyle = pistGrad;
            ctx.beginPath();
            ctx.moveTo(cx - pistW/2, pistTop + 5);
            ctx.quadraticCurveTo(cx, pistTop - 2, cx + pistW/2, pistTop + 5);
            ctx.lineTo(cx + pistW/2, pistY + pistH/2);
            ctx.lineTo(cx - pistW/2, pistY + pistH/2);
            ctx.closePath();
            ctx.fill();

            // Segmento (Fascia Elastica Singola per meno attrito a 16k RPM)
            ctx.fillStyle = "#111";
            ctx.fillRect(cx - pistW/2 - 1.5, pistTop + 12, pistW + 3, 5);

            // Spinotto e fori di alleggerimento
            ctx.beginPath(); ctx.arc(cx, pistY - 5, 12, 0, Math.PI*2);
            ctx.fillStyle = "#1a1c23"; ctx.fill(); ctx.stroke();
            
            // Foro gonna pistone
            ctx.beginPath(); ctx.arc(cx, pistY + 25, 8, 0, Math.PI*2);
            ctx.fillStyle = "#0a0a0c"; ctx.fill();
        }

        function drawFluids(pistY, angle, rpm) {
            const pistTop = pistY - pistH/2;
            const pistBottom = pistY + pistH/2;

            // Intensità fluida basata sui giri
            const intensity = Math.min(1, rpm / 8000);

            // 1. Camera Combustione
            if (angle > 0 && angle < Math.PI / 2) {
                // Esplosione ad alta pressione
                const fireGrad = ctx.createRadialGradient(cx, cylTop, 5, cx, cylTop, 180 + (intensity * 50));
                fireGrad.addColorStop(0, "#ffffff");
                fireGrad.addColorStop(0.1, "rgba(255, 200, 0, 0.9)");
                fireGrad.addColorStop(0.4, "rgba(255, 69, 0, 0.7)");
                fireGrad.addColorStop(1, "rgba(0, 0, 0, 0)");
                ctx.fillStyle = fireGrad;
            } else if (angle >= Math.PI / 2 && angle < Math.PI) {
                // Gas espulsi
                ctx.fillStyle = `rgba(116, 125, 140, ${0.6 + intensity * 0.3})`;
            } else {
                // Compressione estrema
                const comp = 1 - ((pistTop - cylTop) / (340 - cylTop)); 
                ctx.fillStyle = `rgba(0, 229, 255, ${0.1 + (comp * 0.8)})`;
            }
            ctx.fillRect(cx - 53, cylTop - 20, 106, pistTop - cylTop + 30);

            // 2. Scarico
            if (pistTop > 180 && angle > 1) {
                const exhaustGrad = ctx.createLinearGradient(cx + 55, 0, cx + 180, 0);
                exhaustGrad.addColorStop(0, `rgba(116, 125, 140, ${0.8 * intensity})`);
                exhaustGrad.addColorStop(1, "rgba(116, 125, 140, 0)");
                ctx.fillStyle = exhaustGrad;
                ctx.beginPath();
                ctx.moveTo(cx + 55, 180); ctx.lineTo(cx + 180, 150);
                ctx.lineTo(cx + 180, 260); ctx.lineTo(cx + 55, 235);
                ctx.fill();
            }

            // 3. Carter Pieno
            ctx.fillStyle = `rgba(0, 229, 255, ${0.3 + intensity * 0.2})`;
            ctx.beginPath(); ctx.arc(cx, cy, 93, 0, Math.PI*2); ctx.fill();
            ctx.fillRect(cx - 53, pistBottom, 106, (cy-93) - pistBottom + 95);

            // 4. Aspirazione (Lamelle)
            if (pistBottom < 380) {
                ctx.fillStyle = `rgba(0, 229, 255, ${0.6 * intensity})`;
                ctx.fillRect(cx + 55, 320, 65, 60);
            }

            // 5. Travaso
            if (pistTop > 195) {
                ctx.fillStyle = `rgba(0, 229, 255, ${0.8 * intensity})`;
                ctx.fillRect(cx - 100, 195, 45, 115);
            }
        }

        function drawSpark(rpm) {
            // Effetto lampo estremo (diventa bluastro/bianco ai massimi regimi)
            const sparkColor = rpm > 13000 ? "#00e5ff" : "#ffffff";
            ctx.shadowColor = sparkColor;
            ctx.shadowBlur = 40;
            ctx.strokeStyle = sparkColor;
            ctx.lineWidth = rpm > 10000 ? 4 : 2; // Scintilla più grassa ai regimi alti
            
            ctx.beginPath();
            ctx.moveTo(cx, cylTop - 10);
            // Zig-zag generato randomicamente per realismo elettrico
            let currentY = cylTop - 10;
            let currentX = cx;
            while(currentY < cylTop + 30) {
                currentY += Math.random() * 10 + 5;
                currentX += (Math.random() - 0.5) * 20;
                ctx.lineTo(currentX, currentY);
            }
            ctx.stroke();

            // Bagliore centrale
            ctx.shadowBlur = 60;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(cx, cylTop + 5, 8, 0, Math.PI*2); ctx.fill();

            ctx.shadowBlur = 0; 
        }

        requestAnimationFrame(draw);
    </script>
</body>
</html>
