<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Motore a Due Tempi - PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #141518;
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
            --accent-blue: #00d2d3;   /* Miscela */
            --accent-orange: #ff6b22; /* Combustione */
            --accent-red: #ff4757;    /* Redline RPM */
            --metal-light: #dfe4ea;
            --border-color: #2f3542;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #1a1c23 0%, var(--bg-color) 70%);
        }

        header {
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #dfe4ea, #747d8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1300px;
            margin: 2rem auto;
            gap: 2rem;
            padding: 0 1rem;
            flex: 1;
        }

        .animation-section {
            flex: 1 1 550px;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #2f3542;
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .controls-section {
            flex: 1 1 400px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-orange));
        }

        .panel h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* Telemetria RPM */
        .rpm-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            text-align: right;
            margin-bottom: 1rem;
            color: var(--accent-blue);
            text-shadow: 0 0 20px rgba(0, 210, 211, 0.4);
            transition: color 0.2s;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid var(--accent-orange);
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 15px rgba(255, 107, 34, 0.6);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: linear-gradient(90deg, #2f3542 0%, #2f3542 60%, var(--accent-red) 100%);
            border-radius: 4px;
        }

        .dynamic-phase {
            font-size: 1.1rem;
            line-height: 1.7;
            padding: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-left: 4px solid var(--accent-blue);
            border-radius: 0 8px 8px 0;
            min-height: 140px;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .rpm-display { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Motore a 2 Tempi - High Performance</h1>
    </header>

    <main class="container">
        <section class="animation-section">
            <canvas id="engineCanvas" width="600" height="700"></canvas>
        </section>

        <section class="controls-section">
            
            <div class="panel">
                <h2>Acceleratore (Giri/Min)</h2>
                <div class="rpm-display" id="rpmValue">1500</div>
                <input type="range" id="rpmRange" min="0" max="13800" value="1500" step="100">
            </div>

            <div class="panel">
                <h2>Analisi Fase Dinamica</h2>
                <div class="dynamic-phase" id="dynamicText">
                    In attesa di accensione...
                </div>
            </div>

        </section>
    </main>

    <script>
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');
        const rpmInput = document.getElementById('rpmRange');
        const rpmDisplay = document.getElementById('rpmValue');
        const dynamicText = document.getElementById('dynamicText');

        // Geometria
        const cx = 300;           
        const cy = 520;           
        const crankRadius = 55;   
        const conrodLen = 170;    
        const pistW = 96;         
        const pistH = 85;         
        const cylTop = 150;       

        let angle = 0;
        let lastTime = performance.now();

        function draw(time) {
            const dt = time - lastTime;
            lastTime = time;

            const rpm = parseInt(rpmInput.value);
            
            // Aggiorna UI RPM con colori (Rosso sopra gli 11.000)
            rpmDisplay.textContent = rpm;
            if (rpm > 11000) {
                rpmDisplay.style.color = "var(--accent-red)";
                rpmDisplay.style.textShadow = "0 0 20px rgba(255, 71, 87, 0.5)";
            } else if (rpm > 6000) {
                rpmDisplay.style.color = "var(--accent-orange)";
                rpmDisplay.style.textShadow = "0 0 20px rgba(255, 107, 34, 0.5)";
            } else {
                rpmDisplay.style.color = "var(--accent-blue)";
                rpmDisplay.style.textShadow = "0 0 20px rgba(0, 210, 211, 0.4)";
            }

            // Scala visiva degli RPM per un rendering fluido ma che renda l'idea della velocità estrema
            const visualRpmScale = rpm / 6000; 
            const speed = visualRpmScale * 0.4; 
            
            angle += speed;
            if (angle >= Math.PI * 2) angle -= Math.PI * 2;

            const crankX = cx + crankRadius * Math.sin(angle);
            const crankY = cy - crankRadius * Math.cos(angle);
            const pistY = crankY - Math.sqrt(conrodLen**2 - (crankX - cx)**2);

            // Testo Dinamico
            let phase = "";
            let phaseColor = "";
            if (angle > 0 && angle <= Math.PI) {
                if (angle < 0.5) {
                    phase = "<strong>FASE ESPANSIONE:</strong> L'innesco della candela genera un'onda di pressione ad altissima temperatura. Il pistone viene scagliato verso il basso.";
                    phaseColor = "var(--accent-orange)";
                } else if (angle < 2.5) {
                    phase = "<strong>FASE SCARICO:</strong> Apertura luce di scarico. I gas combusti fuoriescono ad alta velocità nell'espansione della marmitta.";
                    phaseColor = "#747d8c";
                } else {
                    phase = "<strong>FASE LAVAGGIO (Travaso):</strong> La miscela fresca, pre-compressa nel carter pompa, entra prepotentemente nel cilindro, spingendo fuori gli ultimi gas combusti.";
                    phaseColor = "var(--accent-blue)";
                }
            } else {
                if (angle < Math.PI + 1.5) {
                    phase = "<strong>FASE COMPRESSIONE:</strong> Il pistone sigilla le luci di scarico e travaso. La miscela nel cilindro viene compressa a pressioni elevatissime verso la testata.";
                    phaseColor = "var(--accent-blue)";
                } else {
                    phase = "<strong>FASE ASPIRAZIONE:</strong> La risalita del pistone crea un forte vuoto nel carter pompa. La luce di aspirazione si apre richiamando aria e benzina dal carburatore.";
                    phaseColor = "var(--accent-blue)";
                }
            }

            if (rpm > 0) {
                dynamicText.innerHTML = phase;
                dynamicText.style.borderLeftColor = phaseColor;
            }

            // Pulisci Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ordine di render (Z-Index pittorico)
            drawFluids(pistY, angle);
            drawEngineBlock();
            drawMovingParts(pistY, crankX, crankY, angle);

            if (angle < 0.4 || angle > Math.PI * 2 - 0.1) {
                if(rpm > 0) drawSpark();
            }

            requestAnimationFrame(draw);
        }

        function drawEngineBlock() {
            // Alette di raffreddamento (Realismo visivo)
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#57606f";
            for(let i=0; i<6; i++) {
                const fy = cylTop + 20 + (i*25);
                ctx.beginPath();
                ctx.moveTo(cx - 50, fy); ctx.lineTo(cx - 95, fy);
                ctx.moveTo(cx + 50, fy); ctx.lineTo(cx + 95, fy);
                ctx.stroke();
            }

            // Metallo del blocco
            ctx.lineWidth = 8;
            const blockGrad = ctx.createLinearGradient(cx - 80, 0, cx + 80, 0);
            blockGrad.addColorStop(0, "#a4b0be");
            blockGrad.addColorStop(0.5, "#ced6e0");
            blockGrad.addColorStop(1, "#747d8c");
            
            ctx.strokeStyle = blockGrad;
            ctx.fillStyle = "#1e272e"; // Sfondo scuro interno cilindro

            // Carter Inferiore
            ctx.beginPath();
            ctx.arc(cx, cy, 90, -Math.PI/4.5, Math.PI + Math.PI/4.5);
            ctx.stroke();

            // Parete Sx e Travaso
            ctx.beginPath();
            ctx.moveTo(cx - 50, cy - 65); 
            ctx.lineTo(cx - 50, 300);
            ctx.lineTo(cx - 85, 300); // Bypass out
            ctx.lineTo(cx - 85, 190); // Bypass in
            ctx.lineTo(cx - 50, 190);
            ctx.lineTo(cx - 50, cylTop);
            ctx.stroke();

            // Parete Dx, Scarico e Aspirazione
            ctx.beginPath();
            ctx.moveTo(cx + 50, cylTop);
            ctx.lineTo(cx + 50, 180); // Inizio Scarico
            ctx.moveTo(cx + 50, 230); // Fine Scarico
            ctx.lineTo(cx + 50, 310); // Inizio Aspirazione
            ctx.moveTo(cx + 50, 360); // Fine Aspirazione
            ctx.lineTo(cx + 50, cy - 65);
            ctx.stroke();

            // Testata (Cupola)
            ctx.beginPath();
            ctx.moveTo(cx - 50, cylTop);
            ctx.quadraticCurveTo(cx, cylTop - 30, cx + 50, cylTop);
            ctx.stroke();

            // Condotto Scarico (Dx alto)
            ctx.beginPath();
            ctx.moveTo(cx + 50, 180); ctx.lineTo(cx + 120, 190);
            ctx.moveTo(cx + 50, 230); ctx.lineTo(cx + 120, 230);
            ctx.stroke();

            // Condotto Aspirazione (Dx basso)
            ctx.beginPath();
            ctx.moveTo(cx + 50, 310); ctx.lineTo(cx + 120, 310);
            ctx.moveTo(cx + 50, 360); ctx.lineTo(cx + 120, 350);
            ctx.stroke();

            // Candela
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(cx - 12, cylTop - 45, 24, 30);
            ctx.fillStyle = "#ff4757"; // Cappuccio rosso
            ctx.fillRect(cx - 15, cylTop - 60, 30, 15);
            ctx.fillStyle = "#2f3542";
            ctx.fillRect(cx - 4, cylTop - 15, 8, 10);
        }

        function drawMovingParts(pistY, crankX, crankY, angle) {
            // Albero Motore (Gradiente radiale per effetto 3D)
            const crankGrad = ctx.createRadialGradient(cx, cy, 5, cx, cy, 35);
            crankGrad.addColorStop(0, "#dfe4ea");
            crankGrad.addColorStop(1, "#57606f");

            ctx.beginPath();
            ctx.arc(cx, cy, 35, 0, Math.PI * 2);
            ctx.fillStyle = crankGrad;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#2f3542";
            ctx.stroke();

            // Contrappeso (Spalle dell'albero a manovella)
            ctx.beginPath();
            ctx.arc(cx, cy, 55, angle - Math.PI/2.2, angle + Math.PI/2.2);
            ctx.lineWidth = 25;
            ctx.strokeStyle = "#2f3542";
            ctx.stroke();
            
            // Biella (Gradiente lineare)
            const conrodGrad = ctx.createLinearGradient(cx, pistY, crankX, crankY);
            conrodGrad.addColorStop(0, "#a4b0be");
            conrodGrad.addColorStop(1, "#57606f");

            ctx.beginPath();
            ctx.moveTo(crankX, crankY);
            ctx.lineTo(cx, pistY);
            ctx.lineWidth = 16;
            ctx.lineCap = "round";
            ctx.strokeStyle = conrodGrad;
            ctx.stroke();
            ctx.lineCap = "butt"; // Reset

            // Perno di manovella
            ctx.beginPath();
            ctx.arc(crankX, crankY, 12, 0, Math.PI*2);
            ctx.fillStyle = "#1e272e";
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#747d8c";
            ctx.stroke();

            // Pistone (Gradiente per bombatura e metallo)
            const pistTop = pistY - pistH/2;
            const pistGrad = ctx.createLinearGradient(cx - pistW/2, 0, cx + pistW/2, 0);
            pistGrad.addColorStop(0, "#747d8c");
            pistGrad.addColorStop(0.5, "#ffffff");
            pistGrad.addColorStop(1, "#57606f");

            ctx.fillStyle = pistGrad;
            ctx.beginPath();
            // Profilo bombato cielo del pistone
            ctx.moveTo(cx - pistW/2, pistTop + 10);
            ctx.quadraticCurveTo(cx, pistTop - 5, cx + pistW/2, pistTop + 10);
            ctx.lineTo(cx + pistW/2, pistY + pistH/2);
            ctx.lineTo(cx - pistW/2, pistY + pistH/2);
            ctx.closePath();
            ctx.fill();

            // Fasce elastiche (Segmenti neri)
            ctx.fillStyle = "#1e272e";
            ctx.fillRect(cx - pistW/2 - 1, pistTop + 15, pistW + 2, 4);
            ctx.fillRect(cx - pistW/2 - 1, pistTop + 25, pistW + 2, 4);

            // Spinotto del pistone
            ctx.beginPath();
            ctx.arc(cx, pistY, 10, 0, Math.PI*2);
            ctx.fillStyle = "#2f3542";
            ctx.fill();
            ctx.stroke();
        }

        function drawFluids(pistY, angle) {
            const pistTop = pistY - pistH/2;
            const pistBottom = pistY + pistH/2;

            // 1. Camera di Combustione
            if (angle > 0 && angle < Math.PI / 2) {
                // Scoppio estremo (Gradiente Radiale)
                const fireGrad = ctx.createRadialGradient(cx, cylTop, 10, cx, cylTop, 150);
                fireGrad.addColorStop(0, "rgba(255, 255, 255, 0.9)");
                fireGrad.addColorStop(0.2, "rgba(255, 200, 0, 0.8)");
                fireGrad.addColorStop(0.6, "rgba(255, 69, 0, 0.6)");
                fireGrad.addColorStop(1, "rgba(255, 0, 0, 0)");
                ctx.fillStyle = fireGrad;
            } else if (angle >= Math.PI / 2 && angle < Math.PI) {
                ctx.fillStyle = "rgba(116, 125, 140, 0.7)"; // Gas grigi
            } else {
                // Compressione Blu
                const comp = 1 - ((pistTop - cylTop) / (340 - cylTop)); 
                ctx.fillStyle = `rgba(0, 210, 211, ${0.1 + (comp * 0.7)})`;
            }
            ctx.fillRect(cx - 48, cylTop, 96, pistTop - cylTop + 10);

            // 2. Luce di Scarico (Destra alta)
            if (pistTop > 180 && angle > 1) {
                ctx.fillStyle = "rgba(116, 125, 140, 0.8)";
                ctx.fillRect(cx + 50, 180, 70, 50);
            }

            // 3. Carter Pieno (Sotto pistone)
            ctx.fillStyle = "rgba(0, 210, 211, 0.4)";
            ctx.beginPath();
            ctx.arc(cx, cy, 88, 0, Math.PI*2);
            ctx.fill();
            ctx.fillRect(cx - 48, pistBottom, 96, (cy-88) - pistBottom + 90);

            // 4. Luce Aspirazione (Destra bassa)
            if (pistBottom < 360) {
                ctx.fillStyle = "rgba(0, 210, 211, 0.7)";
                ctx.fillRect(cx + 50, 310, 70, 50);
            }

            // 5. Luce Travaso (Sinistra)
            if (pistTop > 190) {
                ctx.fillStyle = "rgba(0, 210, 211, 0.8)";
                ctx.fillRect(cx - 85, 190, 35, 110);
            }
        }

        function drawSpark() {
            // Effetto lampo iper-realistico
            ctx.shadowColor = "#ffffff";
            ctx.shadowBlur = 30;
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            ctx.moveTo(cx, cylTop - 5);
            ctx.lineTo(cx - 10, cylTop + 10);
            ctx.lineTo(cx + 5, cylTop + 15);
            ctx.lineTo(cx - 15, cylTop + 35);
            ctx.lineTo(cx + 10, cylTop + 25);
            ctx.lineTo(cx, cylTop + 45);
            ctx.stroke();

            // Core centrale della scintilla
            ctx.shadowColor = "#00d2d3";
            ctx.shadowBlur = 50;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(cx, cylTop + 5, 6, 0, Math.PI*2);
            ctx.fill();

            ctx.shadowBlur = 0; // Reset
        }

        // Avvio
        requestAnimationFrame(draw);
    </script>
</body>
</html>
